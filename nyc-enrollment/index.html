            if (v >= 1000000) return (v / 1000000).toFixed(1) + 'M';
            if (v >= 1000) return (v / 1000).toFixed(0) + 'k';

        };

        const CustomTooltip = ({ active, payload, label }) => {
            if (!active || !payload || !payload.length || payload[0].value === undefined) return null;
            var displayLabel = typeof label === 'number' ? Math.floor(label) : label;
            var total = payload.reduce((sum, e) => sum + e.value, 0);
            return (
                <div style={{ background: '#050507', color: '#fff', padding: '16px 20px', minWidth: '240px', fontFamily: 'var(--font-primary)', boxShadow: '0 8px 32px rgba(0,0,0,0.24)' }}>

            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('composition');
            const [progress, setProgress] = useState(2025);
            const [isPlaying, setIsPlaying] = useState(false);

            useEffect(() => {
                var raf;
                var last = performance.now();
                var tick = (now) => {
                    var dt = now - last;
                    last = now;
                    setProgress(prev => {
                        var next = prev + (dt / 120);
                        if (next >= 2025) { setIsPlaying(false); return 2025; }
                        return next;
                    });
                    raf = requestAnimationFrame(tick);
                };
                if (isPlaying) { last = performance.now(); raf = requestAnimationFrame(tick); }
                return () => cancelAnimationFrame(raf);
            }, [isPlaying]);

            const handlePlayPause = () => {
                if (progress >= 2025 && !isPlaying) { setProgress(1940); setIsPlaying(true); }
                else { setIsPlaying(!isPlaying); }
            };
            const handleReset = () => { setIsPlaying(false); setProgress(1940); };

            var yr = Math.floor(progress);
            var frac = progress - yr;
            var animatedData = compositionData.filter(d => d.year <= yr);
            if (yr < 2025) {
                var prev = compositionData.find(p => p.year === yr);
                var next = compositionData.find(p => p.year === yr + 1);
                if (prev && next && frac > 0) {
                    var lerp = (a, b) => a + (b - a) * frac;
                    animatedData.push({
                        year: yr + frac,
                        public: lerp(prev.public, next.public),
                        religious: lerp(prev.religious, next.religious),
                        nonReligious: lerp(prev.nonReligious, next.nonReligious),
                        charter: lerp(prev.charter, next.charter),
                        homeschool: lerp(prev.homeschool, next.homeschool),
                    });
                }
            }

            var currentEntry = animatedData[animatedData.length - 1] || compositionData[0];
            var currentTotal = currentEntry.public + currentEntry.religious + currentEntry.nonReligious + currentEntry.charter + currentEntry.homeschool;
            var peakEntry = compositionData.reduce((max, d) => {
                var t = d.public + d.religious + d.nonReligious + d.charter + d.homeschool;
                return t > (max.public + max.religious + max.nonReligious + max.charter + max.homeschool) ? d : max;
            });
            var peakTotal = peakEntry.public + peakEntry.religious + peakEntry.nonReligious + peakEntry.charter + peakEntry.homeschool;

            var tabs = [
                { id: 'composition', label: 'Total K-12 Composition' },
                { id: 'prek', label: 'Early Childhood (Pre-K / 3-K)' },

            ];

                            {"The city\u2019s schools are shrinking\u2014but this isn\u2019t just a pandemic story"}
                        </h1>
                        <p style={{ fontFamily: 'var(--font-secondary)', fontSize: 'clamp(16px, 2.5vw, 20px)', color: '#707175', lineHeight: 1.5, maxWidth: '600px' }}>
                            85 years of enrollment data, from Baby Boom to pandemic exodus
                        </p>
                    </div>

                    <div className="custom-scrollbar" style={{ display: 'flex', borderBottom: '1px solid #ddd', marginBottom: '32px', overflowX: 'auto' }}>
                        {tabs.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
                                background: 'none', border: 'none',
                                borderBottom: activeTab === tab.id ? '3px solid #050507' : '3px solid transparent',
                                padding: '12px 20px', fontSize: '12px',
                                fontWeight: activeTab === tab.id ? 700 : 500,
                                textTransform: 'uppercase', letterSpacing: '0.08em',
                                color: activeTab === tab.id ? '#050507' : '#707175',
                                cursor: 'pointer', whiteSpace: 'nowrap', fontFamily: 'var(--font-primary)',
                            }}>{tab.label}</button>
                        ))}
                    </div>

                    {/* TAB 1: COMPOSITION - uses display toggle */}
                    <div style={{ display: activeTab === 'composition' ? 'block' : 'none' }}>
                        <h2 style={{ fontSize: '22px', fontWeight: 900, letterSpacing: '-0.02em', marginBottom: '4px' }}>
                            NYC lost 300,000 K-12 students from peak to present
                        </h2>
                        <p style={{ fontSize: '13px', color: '#707175', marginBottom: '24px' }}>
                            {"Total enrollment by sector, 1940\u20132025 (estimated)"}
                        </p>

                        <div style={{ display: 'flex', gap: '12px', marginBottom: '28px', flexWrap: 'wrap' }}>
                            <StatCard label="Current Year" value={Math.floor(progress)} />
                            <StatCard label="Total Students" value={formatYAxis(Math.round(currentTotal))} detail={'Peak: ' + formatYAxis(peakTotal) + ' in ' + peakEntry.year} />
                            <StatCard label="Public School Share" value={((currentEntry.public / currentTotal) * 100).toFixed(0) + '%'} detail={formatNumber(Math.round(currentEntry.public)) + ' students'} color="#dde44c" />
                            <StatCard label="Charter Share" value={((currentEntry.charter / currentTotal) * 100).toFixed(1) + '%'} detail={currentEntry.charter > 0 ? formatNumber(Math.round(currentEntry.charter)) + ' students' : 'Not yet established'} color="#ff7c53" />
                        </div>

                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '10px 16px', background: '#f8f8f8', border: '1px solid #ddd', marginBottom: '20px', flexWrap: 'wrap' }}>
                            <button onClick={handlePlayPause} style={{ width: '36px', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#050507', color: '#fff', border: 'none', cursor: 'pointer' }}>
                                {isPlaying ? <PauseIcon /> : <PlayIcon />}
                            </button>
                            <button onClick={handleReset} style={{ width: '36px', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#fff', color: '#050507', border: '1px solid #ddd', cursor: 'pointer' }}>
                                <ResetIcon />
                            </button>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: 1, minWidth: '200px' }}>
                                <span style={{ fontSize: '11px', fontWeight: 700, color: '#707175', fontVariantNumeric: 'tabular-nums' }}>1940</span>
                                <input type="range" min="1940" max="2025" step="0.1" value={progress} onChange={(e) => { setProgress(parseFloat(e.target.value)); setIsPlaying(false); }} style={{ flex: 1 }} />
                                <span style={{ fontSize: '13px', fontWeight: 900, color: '#050507', fontVariantNumeric: 'tabular-nums', width: '32px' }}>{Math.floor(progress)}</span>
                            </div>
                        </div>

                        <div style={{ height: '420px', width: '100%' }}>
                            <ResponsiveContainer width="100%" height="100%">
                                <AreaChart data={animatedData} margin={{ top: 10, right: 10, left: 10, bottom: 0 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eee" />
                                    <XAxis dataKey="year" type="number" domain={[1940, 2025]} ticks={[1940, 1950, 1960, 1970, 1980, 1990, 2000, 2010, 2020]} tick={{ fill: '#707175', fontSize: 11 }} axisLine={false} tickLine={false} />
                                    <YAxis tickFormatter={formatYAxis} tick={{ fill: '#707175', fontSize: 11 }} axisLine={false} tickLine={false} width={45} />
                                    <Tooltip content={<CustomTooltip />} />
                                    <Legend iconType="square" iconSize={10} wrapperStyle={{ paddingTop: '16px', fontSize: '12px' }} />
                                    <Area isAnimationActive={false} type="monotone" dataKey="public" name="Traditional Public" stackId="1" stroke="#dde44c" fill="#dde44c" fillOpacity={0.9} />
                                    <Area isAnimationActive={false} type="monotone" dataKey="religious" name="Religious / Parochial" stackId="1" stroke="#394882" fill="#394882" fillOpacity={0.85} />
                                    <Area isAnimationActive={false} type="monotone" dataKey="nonReligious" name="Independent (Secular)" stackId="1" stroke="#9b9fbc" fill="#9b9fbc" fillOpacity={0.8} />
                                    <Area isAnimationActive={false} type="monotone" dataKey="charter" name="Charter" stackId="1" stroke="#ff7c53" fill="#ff7c53" fillOpacity={0.9} />
                                    <Area isAnimationActive={false} type="monotone" dataKey="homeschool" name="Homeschool" stackId="1" stroke="#e7466d" fill="#e7466d" fillOpacity={0.85} />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        <div style={{ marginTop: '16px', fontSize: '11px', color: '#707175', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                            <div>
                                <span style={{ fontWeight: 600 }}>Source:</span>{' '}
                                <a href="https://data.nysed.gov/" style={{ color: '#707175', textDecoration: 'underline' }}>NYS Education Dept.</a>,{' '}
                                <a href="https://ibo.nyc.ny.us/" style={{ color: '#707175', textDecoration: 'underline' }}>NYC IBO</a>,{' '}
                                <a href="https://infohub.nyced.org/" style={{ color: '#707175', textDecoration: 'underline' }}>DOE InfoHub</a>
                                <br /><em>Note: Pre-2000 data are historical estimates.</em>
                            </div>
                        </div>
                    </div>

                    {/* TAB 2: EARLY CHILDHOOD */}
                    {activeTab === 'prek' && <div>
                        <h2 style={{ fontSize: '22px', fontWeight: 900, letterSpacing: '-0.02em', marginBottom: '4px' }}>
                            The early childhood boom masked the K-12 decline
                        </h2>
                        <p style={{ fontSize: '13px', color: '#707175', marginBottom: '28px' }}>
                            Universal Pre-K launched in 2014; 3-K for All began in 2017
                        </p>

                        <div style={{ display: 'flex', gap: '12px', marginBottom: '28px', flexWrap: 'wrap' }}>
                            <StatCard label="Pre-K Peak" value="70k" detail={"2016\u20132017"} color="#217ebe" />
                            <StatCard label="Pre-K 2025" value="52k" detail="-26% from peak" color="#217ebe" />
                            <StatCard label="3-K Peak" value="42k" detail="2023" color="#cea9be" />
                            <StatCard label="Combined 2025" value="90k" detail="Down from 97k peak" />
                        </div>

                        <div style={{ height: '400px', width: '100%' }}>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={earlyChildhoodData} margin={{ top: 10, right: 10, left: 10, bottom: 0 }}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eee" />
                                    <XAxis dataKey="year" tick={{ fill: '#707175', fontSize: 11 }} axisLine={false} tickLine={false} />
                                    <YAxis tickFormatter={formatYAxis} tick={{ fill: '#707175', fontSize: 11 }} axisLine={false} tickLine={false} width={40} />
                                    <Tooltip content={<CustomTooltip />} cursor={{ fill: 'rgba(221,228,76,0.1)' }} />
                                    <Legend iconType="square" iconSize={10} wrapperStyle={{ paddingTop: '16px', fontSize: '12px' }} />
                                    <Bar isAnimationActive={false} dataKey="preK" name="Pre-K Enrollment" stackId="a" fill="#217ebe" />
                                    <Bar isAnimationActive={false} dataKey="threeK" name="3-K Enrollment" stackId="a" fill="#cea9be" radius={[3, 3, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div style={{ marginTop: '16px', fontSize: '11px', color: '#707175', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                            <div><span style={{ fontWeight: 600 }}>Source:</span>{' '}<a href="https://infohub.nyced.org/reports/school-quality/information-and-data-overview" style={{ color: '#707175', textDecoration: 'underline' }}>NYC DOE Demographic Snapshots</a></div>
                        </div>
                    </div>}

                    {/* TAB 3: GRADES */}
                    {activeTab === 'grades' && <div>
                        <h2 style={{ fontSize: '22px', fontWeight: 900, letterSpacing: '-0.02em', marginBottom: '4px' }}>
                            {"Lower grades got hollowed out\u2014the ripple hasn\u2019t stopped"}
                        </h2>
                        <p style={{ fontSize: '13px', color: '#707175', marginBottom: '28px' }}>
                            Public school enrollment by grade, 2019 vs. 2025
                        </p>

                        <div style={{ display: 'flex', gap: '12px', marginBottom: '28px', flexWrap: 'wrap' }}>
                            <StatCard label="Kindergarten Drop" value="-22%" detail={"72k \u2192 56k"} color="#e7466d" />
                            <StatCard label="Grade 1 Drop" value="-20%" detail={"74k \u2192 59k"} color="#e7466d" />
                            <StatCard label="Grade 12 Drop" value="-3%" detail={"66k \u2192 64k"} color="#707175" />
                        </div>

                        <div style={{ height: '400px', width: '100%' }}>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={gradeData} margin={{ top: 10, right: 10, left: 10, bottom: 0 }} barCategoryGap="20%">
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eee" />
                                    <XAxis dataKey="grade" tick={{ fill: '#707175', fontSize: 11 }} axisLine={false} tickLine={false} />
                                    <YAxis tickFormatter={formatYAxis} tick={{ fill: '#707175', fontSize: 11 }} axisLine={false} tickLine={false} width={40} />
                                    <Tooltip content={<CustomTooltip />} cursor={{ fill: 'rgba(221,228,76,0.1)' }} />
                                    <Legend iconType="square" iconSize={10} wrapperStyle={{ paddingTop: '16px', fontSize: '12px' }} />
                                    <Bar isAnimationActive={false} dataKey="y2019" name="2019 Enrollment" fill="#dddddd" radius={[3, 3, 0, 0]} />
                                    <Bar isAnimationActive={false} dataKey="y2025" name="2025 Enrollment" fill="#e7466d" radius={[3, 3, 0, 0]} />
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div style={{ marginTop: '16px', fontSize: '11px', color: '#707175', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
                            <div><span style={{ fontWeight: 600 }}>Source:</span>{' '}<a href="https://infohub.nyced.org/" style={{ color: '#707175', textDecoration: 'underline' }}>NYC DOE InfoHub</a></div>
                        </div>
                    </div>}

                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
