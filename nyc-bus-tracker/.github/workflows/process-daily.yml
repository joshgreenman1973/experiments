name: Process Daily Summary

on:
  # Run daily at 5:00 AM UTC (midnight ET during EDT, 12am EST)
  schedule:
    - cron: '0 5 * * *'

  # Manual trigger with optional date override
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to process (YYYY-MM-DD), defaults to yesterday'
        required: false

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd nyc-bus-tracker/collector && npm ci

      - name: Process yesterday's snapshots
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ='America/New_York' date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ='America/New_York' date -v-1d '+%Y-%m-%d')
          fi
          echo "Processing date: $DATE"
          node nyc-bus-tracker/collector/process.js "$DATE"

      - name: Generate weekly/monthly rollups
        run: node nyc-bus-tracker/collector/rollup.js

      - name: Commit and push summaries
        run: |
          git config user.name "Bus Tracker Bot"
          git config user.email "bus-bot@users.noreply.github.com"
          git add nyc-bus-tracker/data/daily/ nyc-bus-tracker/data/summary/

          if git diff --staged --quiet; then
            echo "No new summaries to commit"
          else
            DATE=$(TZ='America/New_York' date '+%Y-%m-%d')
            git commit -m "Daily summary: ${DATE}"
            git push
          fi
