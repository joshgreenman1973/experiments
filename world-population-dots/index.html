  }

// ── COLORS ──
const goldenAngle = 137.508;
const palette = [];
const rgbColors = [];

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

for (let i = 0; i < countries.length; i++) {
  const hue = (i * goldenAngle) % 360;
  const sat = 60 + (i % 3) * 13;
  const lit = 48 + (i % 5) * 6;
  palette.push(`hsl(${hue}, ${sat}%, ${lit}%)`);
  rgbColors.push(hslToRgb(hue, sat, lit));
}

const regionColors = {
  "Asia": "hsl(200, 70%, 60%)",
  "Africa": "hsl(35, 80%, 55%)",
  "Europe": "hsl(260, 60%, 65%)",
  "Americas": "hsl(140, 60%, 50%)",
  "Oceania": "hsl(330, 60%, 60%)",
  "Other": "hsl(0, 0%, 50%)",
};

// ── SETUP DOTS ──
const DOT_POP = 5;
const dots = [];
let totalDots = 0;
let totalPop = 0;
countries.forEach((c, ci) => {
  const n = Math.max(1, Math.round(c.pop / DOT_POP));
  c.dotCount = n;
  c.popPerDot = c.pop / n;
  c.dotStart = totalDots;
  totalPop += c.pop;
  for (let j = 0; j < n; j++) {
    dots.push({ ci, x: 0, y: 0, tx: 0, ty: 0, ox: 0, oy: 0, born: 0, scale: 0 });
  }
  totalDots += n;
});

// ── CANVAS ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
let W, H, COLS, DOT_R, GAP;
let currentSort = 'default';
let isInitialAnimation = true;
let highlightCI = -1; // country index to highlight, -1 = none
let displayOrder = dots.map((_, i) => i);

function resize() {
  const maxW = Math.min(window.innerWidth - 40, 1100);
  DOT_R = window.innerWidth < 600 ? 3.5 : 5;
  GAP = DOT_R * 2.3;
  COLS = Math.floor(maxW / GAP);
  applySort(currentSort, false);
}

function getSortedCountryIndices(sortType) {
  const indices = countries.map((_, i) => i);
  switch (sortType) {
    case 'largest': indices.sort((a, b) => countries[b].pop - countries[a].pop); break;
    case 'smallest': indices.sort((a, b) => countries[a].pop - countries[b].pop); break;
    case 'alpha': indices.sort((a, b) => countries[a].name.localeCompare(countries[b].name)); break;
    case 'continent':
      const ro = ["Asia", "Africa", "Europe", "Americas", "Oceania", "Other"];
      indices.sort((a, b) => {
        const d = ro.indexOf(countries[a].region) - ro.indexOf(countries[b].region);
        return d !== 0 ? d : countries[b].pop - countries[a].pop;
      });
      break;
  }
  return indices;
}

function posForSlotAt(slot) {
  return { x: (slot % COLS) * GAP + GAP / 2, y: Math.floor(slot / COLS) * GAP + GAP / 2 };
}

function applySort(sortType, animate = true) {
  currentSort = sortType;
  const sorted = getSortedCountryIndices(sortType);

  displayOrder = [];
  sorted.forEach(ci => {
    for (let j = 0; j < countries[ci].dotCount; j++) displayOrder.push(countries[ci].dotStart + j);
  });

  let totalSlots = totalDots;
  if (sortType === 'continent') {
    let slot = 0, lastR = null;
    sorted.forEach(ci => {
      const c = countries[ci];
      if (lastR !== null && c.region !== lastR) {
        const nr = (Math.floor(slot / COLS) + (slot % COLS === 0 ? 0 : 1)) * COLS;
        slot = nr + COLS;
      }
      slot += c.dotCount;
      lastR = c.region;
    });
    totalSlots = slot;
  }

  const ROWS = Math.ceil(totalSlots / COLS);
  W = COLS * GAP;
  H = ROWS * GAP + GAP;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (sortType === 'continent') {
    let slot = 0, lastR = null;
    const labels = [];
    sorted.forEach(ci => {
      const c = countries[ci];
      if (lastR !== null && c.region !== lastR) {
        const nr = (Math.floor(slot / COLS) + (slot % COLS === 0 ? 0 : 1)) * COLS;
        slot = nr + COLS;
      }
      if (c.region !== lastR) {
        const p = posForSlotAt(slot);
        labels.push({ region: c.region, x: p.x - GAP/2, y: p.y - GAP * 1.2 });
      }
      for (let j = 0; j < c.dotCount; j++) {
        const d = dots[c.dotStart + j], p = posForSlotAt(slot);
        if (animate) { d.ox = d.x || p.x; d.oy = d.y || p.y; }
        d.tx = p.x; d.ty = p.y;
        slot++;
      }
      lastR = c.region;
    });
    showRegionLabels(labels);
  } else {
    hideRegionLabels();
    for (let v = 0; v < displayOrder.length; v++) {
      const d = dots[displayOrder[v]], p = posForSlotAt(v);
      if (animate) { d.ox = d.x || p.x; d.oy = d.y || p.y; }
      d.tx = p.x; d.ty = p.y;
    }
  }

  if (animate) { transitionStart = performance.now(); isTransitioning = true; }
  else dots.forEach(d => { d.x = d.tx; d.y = d.ty; d.ox = d.tx; d.oy = d.ty; });

  document.querySelectorAll('#controls button[data-sort]').forEach(b => {
    b.classList.toggle('active', b.dataset.sort === sortType);
  });
}

const regionLabelsEl = document.getElementById('region-labels');
function showRegionLabels(labels) {
  regionLabelsEl.innerHTML = '';
  labels.forEach(l => {
    const el = document.createElement('div');
    el.className = 'region-label';
    el.textContent = l.region;
    el.style.color = regionColors[l.region] || '#888';
    el.style.left = l.x + 'px';
    el.style.top = l.y + 'px';
    regionLabelsEl.appendChild(el);
  });
}
function hideRegionLabels() { regionLabelsEl.innerHTML = ''; }

resize();
window.addEventListener('resize', () => resize());

// ── LEGEND ──
const legendEl = document.getElementById('legend');
countries.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.dataset.ci = i;
  el.innerHTML = `<div class="legend-dot" style="background:${palette[i]}"></div>${c.name} <span style="color:#666">${c.pop}M</span>`;
  el.addEventListener('click', () => highlightCountry(i));
  legendEl.appendChild(el);
});

// ── SEARCH & HIGHLIGHT ──
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
const highlightInfo = document.getElementById('highlight-info');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length === 0) { searchResults.classList.remove('open'); return; }
  const matches = countries
    .map((c, i) => ({ c, i }))
    .filter(({ c }) => c.name.toLowerCase().includes(q))
    .slice(0, 8);
  if (matches.length === 0) { searchResults.classList.remove('open'); return; }
  searchResults.innerHTML = matches.map(({ c, i }) =>
    `<div class="search-result" data-ci="${i}"><span><span style="color:${palette[i]}; font-weight:600">${c.name}</span> &middot; ${c.region}</span><span class="sr-pop">${c.pop}M &middot; ${(c.pop / totalPop * 100).toFixed(2)}%</span></div>`
  ).join('');
  searchResults.classList.add('open');
});

searchResults.addEventListener('click', e => {
  const el = e.target.closest('.search-result');
  if (!el) return;
  const ci = parseInt(el.dataset.ci);
  highlightCountry(ci);
  searchInput.value = '';
  searchResults.classList.remove('open');
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('open'), 200);
});

// Use event delegation so the clear button always works
highlightInfo.addEventListener('click', e => {
  if (e.target.closest('.hi-clear')) {
    clearHighlight();
  }
});

function highlightCountry(ci) {
  highlightCI = ci;
  const c = countries[ci];
  const pct = (c.pop / totalPop * 100).toFixed(2);
  highlightInfo.innerHTML = `<span class="hi-name" style="color:${palette[ci]}">${c.name}</span> &mdash; ${c.pop.toLocaleString()}M people &mdash; <span class="hi-pct">${pct}%</span> of the world <button class="hi-clear">↩ Show All Countries</button>`;
}

function clearHighlight() {
  highlightCI = -1;
  highlightInfo.innerHTML = '';
  searchInput.value = '';
}

// ── TOOLTIP ──
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let found = -1;
  for (let i = dots.length - 1; i >= 0; i--) {
    const d = dots[i];
    if (d.scale < 0.1) continue;
    const dx = d.x - mx, dy = d.y - my;
    if (dx*dx + dy*dy < (DOT_R+2)*(DOT_R+2)) { found = d.ci; break; }
  }
  if (found >= 0) {
    const c = countries[found];
    const pct = (c.pop / totalPop * 100).toFixed(2);
    tooltip.querySelector('.tt-name').textContent = c.name;
    tooltip.querySelector('.tt-name').style.color = palette[found];
    tooltip.querySelector('.tt-pop').textContent = `${c.pop.toLocaleString()}M people (${c.dotCount} dot${c.dotCount > 1 ? 's' : ''})`;
    tooltip.querySelector('.tt-pct').textContent = `${pct}% of world population`;
    tooltip.querySelector('.tt-region').textContent = c.region;
    tooltip.style.opacity = 1;
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  } else {
    tooltip.style.opacity = 0;
  }
});
canvas.addEventListener('mouseleave', () => tooltip.style.opacity = 0);
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let found = -1;
  for (let i = dots.length - 1; i >= 0; i--) {
    const d = dots[i];
    if (d.scale < 0.1) continue;
    const dx = d.x - mx, dy = d.y - my;
    if (dx*dx + dy*dy < (DOT_R+3)*(DOT_R+3)) { found = d.ci; break; }
  }
  if (found >= 0) highlightCountry(found);
  else clearHighlight();
});

// ── ANIMATION ──
let startTime = 0;
let animDuration = 8000;
let transitionStart = 0;
let isTransitioning = false;
const TRANSITION_DUR = 800;
const counterSpan = document.getElementById('counter').querySelector('span');

function easeOutBack(t) { const c = 1.7; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }

function startAnimation() {
  isInitialAnimation = true;
  startTime = performance.now();
  isTransitioning = false;
  currentSort = 'default';
  clearHighlight();
  dots.forEach(d => { d.scale = 0; d.born = 0; });
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('#controls button[data-sort]').forEach(b => b.classList.toggle('active', b.dataset.sort === 'default'));
  hideRegionLabels();

  displayOrder = dots.map((_, i) => i);
  for (let i = 0; i < dots.length; i++) {
    const p = posForSlotAt(i);
    dots[i].tx = p.x; dots[i].ty = p.y; dots[i].ox = p.x; dots[i].oy = p.y;
  }

  let elapsed = 0;
  const dur = animDuration * 0.85;
  countries.forEach((c) => {
    const frac = c.dotCount / totalDots;
    const start = elapsed;
    const d = dur * frac;
    for (let j = 0; j < c.dotCount; j++) {
      dots[c.dotStart + j].born = start + (j / Math.max(1, c.dotCount - 1)) * d * 0.6;
    }
    elapsed += d;
  });
}

function render(now) {
  const t = now - startTime;
  ctx.clearRect(0, 0, W, H);

  let tLerp = 1;
  if (isTransitioning) {
    tLerp = easeInOutCubic(Math.min(1, (now - transitionStart) / TRANSITION_DUR));
    if (tLerp >= 1) isTransitioning = false;
  }

  let currentPop = 0, lastRevealed = -1;
  const dimmed = highlightCI >= 0;

  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];
    if (isInitialAnimation && t < d.born) continue;

    d.scale = isInitialAnimation ? Math.min(1, easeOutBack(Math.min(1, (t - d.born) / 400))) : 1;

    if (isTransitioning) {
      d.x = d.ox + (d.tx - d.ox) * tLerp;
      d.y = d.oy + (d.ty - d.oy) * tLerp;
    } else {
      d.x = d.tx; d.y = d.ty; d.ox = d.tx; d.oy = d.ty;
    }

    const [r, g, b] = rgbColors[d.ci];
    const radius = DOT_R * d.scale;
    const isHighlighted = d.ci === highlightCI;
    const alpha = dimmed ? (isHighlighted ? 1 : 0.12) : 1;

    // Glow for highlighted dots
    if (isHighlighted && dimmed) {
      ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, radius * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Glow for fresh dots
    if (isInitialAnimation && !dimmed) {
      const age = (t - d.born) / 400;
      if (age < 1) {
        ctx.fillStyle = `rgba(${r},${g},${b},${(1 - age) * 0.35})`;
        ctx.beginPath();
        ctx.arc(d.x, d.y, radius * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, radius, 0, Math.PI * 2);
    ctx.fill();

    currentPop += countries[d.ci].popPerDot;
    lastRevealed = d.ci;
  }

  if (isInitialAnimation && t > animDuration + 1000) isInitialAnimation = false;

  counterSpan.textContent = Math.round(currentPop * 1_000_000).toLocaleString();

  for (let i = 0; i <= lastRevealed; i++) {
    const el = legendEl.children[i];
    if (el && !el.classList.contains('visible')) el.classList.add('visible');
  }

  requestAnimationFrame(render);
}

startAnimation();
requestAnimationFrame(render);

// ── CONTROLS ──
document.querySelectorAll('#controls button[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    isInitialAnimation = false;
    dots.forEach(d => { d.scale = 1; d.born = -Infinity; });
    document.querySelectorAll('.legend-item').forEach(el => el.classList.add('visible'));
    applySort(btn.dataset.sort, true);
  });
});

document.getElementById('replayBtn').addEventListener('click', () => { resize(); startAnimation(); });
</script>
</body>
</html>
