name: Monthly Family Dinner Price Check

on:
  schedule:
    # 1st of every month at 10am ET (2pm UTC)
    - cron: '0 14 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run price checker
        working-directory: family-dinner-prices
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/check-prices.js

      - name: Rebuild price history
        working-directory: family-dinner-prices
        run: node scripts/build-history.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add family-dinner-prices/data/snapshots/
          git add family-dinner-prices/data/restaurants.json
          git add family-dinner-prices/price-history.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MONTH=$(date +"%B %Y")
            git commit -m "Monthly price update: ${MONTH}

            Auto-generated by monthly-price-check workflow.
            Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
            git push
          fi
