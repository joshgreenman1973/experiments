name: FOIL Tracker weekly update

on:
  schedule:
    - cron: '15 14 * * 1'  # 10:15 AM ET every Monday
  workflow_dispatch: {}

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: nyc-foil-tracker
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: nyc-foil-tracker
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        working-directory: nyc-foil-tracker
        run: node scrape.mjs --backfill
        env:
          CI: 'true'

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nyc-foil-tracker/data/
          if git diff --staged --quiet; then
            echo "No new data -- skipping commit"
          else
            git commit -m "FOIL Tracker update: $(date -u +%Y-%m-%d)"
            git push
          fi
