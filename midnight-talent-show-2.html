<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE MIDNIGHT TALENT SHOW: BOOK TWO - A Text Adventure at Mark Twain IS 239</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#33ff33;font-family:'IBM Plex Mono','Courier New',monospace;font-size:15px;line-height:1.7;overflow:hidden}
#game{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:820px;margin:0 auto}
#bar{padding:6px 14px;border-bottom:1px solid #1a5c1a;color:#22aa22;font-size:13px;display:flex;justify-content:space-between;flex-shrink:0}
#out{flex:1;overflow-y:auto;padding:14px;scroll-behavior:smooth}
#out::-webkit-scrollbar{width:6px}
#out::-webkit-scrollbar-track{background:#0a0a0a}
#out::-webkit-scrollbar-thumb{background:#1a5c1a;border-radius:3px}
#in{display:flex;align-items:center;padding:8px 14px;border-top:1px solid #1a5c1a;flex-shrink:0}
#in .p{color:#33ff33;margin-right:8px;font-weight:bold;font-size:17px}
#cmd{background:transparent;border:none;color:#33ff33;font-family:inherit;font-size:inherit;outline:none;flex:1;caret-color:#33ff33}
.room{color:#ffdd33;font-weight:bold}
.item{color:#ff9933}
.chr{color:#33ffdd}
.tw{color:#dd99ff;font-style:italic}
.err{color:#ff4444}
.win{color:#33ff99;font-weight:bold}
.sys{color:#888}
.atm{color:#556655;font-style:italic}
.hint{color:#6699aa}
.cmd-echo{color:#1a8a1a}
.quote{color:#ffcc00;font-weight:bold;font-style:italic}
.fake{color:#ff6666;font-style:italic}
p{margin:0 0 6px 0}
#game::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:10}
@media(max-width:600px){body{font-size:13px}#out{padding:10px}}
</style>
</head>
<body>
<div id="game">
<div id="bar"><span id="score">Quotes: 0/5</span><span id="loc"></span><span id="turns">Turns: 0</span></div>
<div id="out"></div>
<div id="in"><span class="p">&gt;</span><input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false" autocapitalize="off"></div>
</div>
<script>
// ========================================================
//  THE MIDNIGHT TALENT SHOW: BOOK TWO
//  A Text Adventure at Mark Twain IS 239, Coney Island
//  For Lola, on the occasion of turning 13
//  "This time, the school is playing YOUR game."
// ========================================================

// ===== STATE =====
let S = {
  room:'creative_writing', inv:['flashlight','backpack'], score:0, turns:0,
  visited:new Set(), flags:{}, history:[], histIdx:-1,
  quotesFound:0, noteSequence:[], wordBank:[]
};

function flag(f){ return !!S.flags[f]; }
function setFlag(f){ S.flags[f]=true; }

// ===== UTILS =====
const out=document.getElementById('out');
const cmdInput=document.getElementById('cmd');
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function print(html,cls){const p=document.createElement('p');if(cls)p.className=cls;p.innerHTML=html;out.appendChild(p);out.scrollTop=out.scrollHeight;}
function printBlank(){print('&nbsp;');}
function match(s,arr){s=s.toLowerCase().trim();return arr.some(a=>s===a||s===a.replace(/ /g,''));}
function addScore(){S.quotesFound++;document.getElementById('score').textContent=`Quotes: ${S.quotesFound}/5`;}
function updateBar(){
  document.getElementById('score').textContent=`Quotes: ${S.quotesFound}/5`;
  document.getElementById('loc').textContent=rooms[S.room]?rooms[S.room].name:'';
  document.getElementById('turns').textContent=`Turns: ${S.turns}`;
}
function hasItem(id){return S.inv.includes(id);}
function addItem(id){if(!S.inv.includes(id))S.inv.push(id);}
function removeItem(id){S.inv=S.inv.filter(i=>i!==id);}
function findItem(name){
  name=name.toLowerCase().replace(/^(the|a|an|my) /,'');
  const map={
    flashlight:['flashlight','light','torch'],
    backpack:['backpack','bag','pack'],
    blank_book:['blank book','book','empty book'],
    tuning_fork:['tuning fork','fork','tuner'],
    mirror_shard:['mirror shard','shard','mirror','glass'],
    courage_medal:['courage medal','medal','badge'],
    golden_pen:['golden pen','pen','gold pen'],
    twain_hat:['hat','top hat','twain hat','mark twain hat',"twain's hat","mark twain's hat"],
    turpentine:['turpentine','solvent','bottle']
  };
  for(const[id,syns]of Object.entries(map))if(syns.some(syn=>name===syn||name.includes(syn)))return id;
  return name.replace(/ /g,'_');
}

const itemNames={
  flashlight:'Flashlight', backpack:'Backpack', blank_book:'Blank Book',
  tuning_fork:'Tuning Fork', mirror_shard:'Mirror Shard', courage_medal:'Courage Medal',
  golden_pen:'Golden Pen', twain_hat:"Mark Twain's Hat", turpentine:'Turpentine'
};

// ===== ROOMS =====
const exits_text = (e) => {
  const labels=[];
  const dirs={n:'North',s:'South',e:'East',w:'West',u:'Up',d:'Down'};
  for(const[d,r] of Object.entries(e)){
    if(d==='s' && r==='neptune_ave' && !flag('act2')) continue;
    labels.push(`<span class="room">${dirs[d]}</span> (${rooms[r]?rooms[r].name:'???'})`);
  }
  return labels.length?`\nExits: ${labels.join(', ')}.`:'';
};

const rooms = {
  creative_writing:{name:"Creative Writing Room (Ms. O'Brien's Room) - 2nd Floor",
    desc(){
      let s=`The creative writing room is eerily quiet. No floating words tonight. No typewriter clacking. The sentence fragments that used to drift like snow have fallen to the floor in heaps of dead letters. The air smells like old paper and something wrong.`;
      s+=`\n\nOn Ms. O'Brien's desk sits a single sheet of paper. Written in shaky handwriting you recognize:`;
      s+=`\n\n<span class="tw">"THEY TOOK MY VOICE. FIND MY FIVE QUOTES. THE SCHOOL DOESN'T WANT TO SLEEP. --M.T."</span>`;
      if(!flag('introRead')){
        s+=`\n\n<span class="hint">You should READ the note on the desk.</span>`;
      }
      if(flag('annabelHere')&&!flag('q3')){
        s+=`\n\n<span class="chr">Annabel</span> sits cross-legged on the floor, sketching rapidly. <span class="chr">"The walls keep changing. I'm trying to draw them before they shift again."</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'second_floor'}
  },

  second_floor:{name:'2nd Floor Hallway',
    desc(){
      let s=`The second floor hallway stretches east and west, but tonight the fluorescents don't buzz--they WHISPER. You catch fragments: <span class="atm">"...she's back..."</span> and <span class="atm">"...can't let her..."</span> and <span class="atm">"...fifty more years..."</span>`;
      s+=`\n\nThe banner still reads <span class="item">"MARK TWAIN IS 239 -- WHERE TALENT MEETS OPPORTUNITY"</span> but the red graffiti underneath has changed. It now says: <span class="err">"...AND OPPORTUNITY MEETS ITS MATCH."</span>`;
      s+=`\n\nThe hallway feels like it's watching you. Because last time, you won. And the school remembers.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'cafeteria',e:'library',w:'creative_writing',s:'math_room',d:'lobby',u:'third_floor'}
  },

  lobby:{name:'Main Lobby - 1st Floor',
    desc(){
      let s=`The lobby of IS 239 looks almost normal. Almost. The trophy cases still gleam, the banner still says <span class="item">"EXPLORE. DREAM. DISCOVER."</span> But Mark Twain's portrait above the front doors is BLANK. An empty gilded frame. No mustache. No knowing eyes. Just canvas.`;
      s+=`\n\nA new trophy has appeared in the case since last year: <span class="item">"LOLA -- CREATIVE WRITING -- 1ST PLACE, BROOKLYN BOROUGH."</span> That makes you smile, even now.`;
      if(flag('conorHere')){
        s+=`\n\n<span class="chr">Conor</span> is examining the front doors. <span class="chr">"Sealed again. Different kind of seal though--these aren't moonlight, they're... words? Like the doors are locked with language."</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{n:'auditorium',e:'courtroom',w:'gym',s:'neptune_ave',u:'second_floor'}
  },

  auditorium:{name:'The Auditorium - 1st Floor',
    desc(){
      let s=`The auditorium is DARK. Not flashlight-dark--the darkness actively pushes your light back. The spotlight that always shone on stage? Dead. The Comedy and Tragedy masks? Both frozen in the same expression: <span class="err">fear</span>.`;
      s+=`\n\nThe piano in the orchestra pit is silent. Its lid is closed and something is carved into the wood: <span class="item">"THE LAST SHOW HAS BEEN PLAYED."</span>`;
      if(S.quotesFound>=5&&!flag('gameWon')){
        s+=`\n\n<span class="hint">Wait--the spotlight is flickering. It's trying to come back. Maybe you should try to READ the quotes aloud here, on stage...</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{s:'lobby',w:'music_room'}
  },

  music_room:{name:'The Music Room - 1st Floor',
    desc(){
      let s=`The music room is wrong. The instruments that once played themselves now hang in the air, frozen, SILENT. The trumpet. The drums. The violin. The piano. All suspended like they're trapped in amber.`;
      if(!flag('q1')){
        s+=`\n\nBut they're not dead. You can see them trembling, straining against whatever silenced them. Each one glows a different color: the trumpet <span class="item">RED</span>, the drums <span class="item">BLUE</span>, the violin <span class="item">GOLD</span>, the piano <span class="item">GREEN</span>.`;
        s+=`\n\nOn the music stand, a page of sheet music. But instead of notes, it reads:`;
        s+=`\n\n<span class="tw">"Four voices, one truth. Play them in the order of the secret."</span>`;
        s+=`\n\n<span class="hint">EXAMINE the instruments and the sheet music. PLAY [instrument] to sound a note. Get the sequence of four right.</span>`;
      } else {
        s+=`\n\nThe instruments play softly, a gentle carousel tune. The music room is alive again.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'auditorium'}
  },

  library:{name:'The Library - 2nd Floor',
    desc(){
      let s=`The library is losing its words. Books on the shelves are going BLANK--the text draining off pages like water off a table, pooling in gutters of ink on the floor. The whispers between books have become panicked static.`;
      if(!flag('q3')){
        s+=`\n\nOn the central reading table, twelve wooden letter tiles are arranged in a scattered pile. They glow faint silver:`;
        s+=`\n\n<span class="item">    S  K  D  I  A  N  R  N  E  K  S  S</span>`;
        s+=`\n\nAbove the table, painted on the ceiling in invisible ink that only appears when you look straight up: <span class="tw">"Not all letters belong. Find the word that needs no eyes or ears to be understood."</span>`;
        s+=`\n\n<span class="hint">Some tiles are decoys. ARRANGE the correct word from the real tiles.</span>`;
      } else {
        s+=`\n\nThe books are writing themselves back. Words flow up from the floor and reattach to pages. The library hums with restored language.`;
      }
      if(flag('sophiaHere')&&!flag('q3')){
        s+=`\n\n<span class="chr">Sophia</span> is pulling books off shelves, flipping through them desperately. <span class="chr">"They're all going blank! Every page! We have to hurry!"</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{w:'second_floor'}
  },

  gym:{name:'The Gymnasium - Ground Floor',
    desc(){
      let s=`The gym is cold. Not spooky-cold--genuinely, physically freezing. Your breath comes out in clouds. The championship banners hang limp. The basketball hoops have bent downward like wilting flowers.`;
      if(!flag('q4')){
        s+=`\n\nIn the center of the court, a circle of ice has formed. And in the center of the ice stands... something. A shadow. It shifts and flickers and grows and shrinks. It has no face, but you can feel it looking at you.`;
        s+=`\n\n<span class="err">It's YOUR shape. Your height, your hair. But made of cold and silence.</span>`;
        s+=`\n\nThe shadow speaks without a mouth: <span class="err">"You can't USE an item on me. You can't GIVE me away. You can't TAKE me. I'm not a puzzle you solve with inventory."</span>`;
        if(flag('conorHere')){
          s+=`\n\n<span class="chr">Conor</span> stands at the edge of the ice, teeth chattering. <span class="chr">"I tried punching it. Didn't work. I tried running past it. Didn't work. It's not that kind of fight."</span>`;
        }
      } else {
        s+=`\n\nThe ice is gone. The gym is warm again. The hoops stand tall. Where the shadow stood, a faint warmth lingers.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'lobby'}
  },

  cafeteria:{name:'The Cafeteria - 2nd Floor',
    desc(){
      let s=`The cafeteria smells like dust instead of ten thousand school lunches. The food behind the counter has turned to gray ash. The pizza doesn't wave. The milk carton doesn't stare. Everything is... fading.`;
      s+=`\n\nThe ghostly lunch lady is still here, but she's translucent now--barely visible. She stirs an empty pot with a ladle that passes through the sides. <span class="tw">"Getting thin, dear. Without the words, we all go thin."</span>`;
      s+=`\n\n<span class="atm">The sign still says "LUNCH PERIOD 5 -- 10:37 AM." At least the schedule is still absurd. Some things are eternal.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{s:'second_floor',d:'basement'}
  },

  math_room:{name:'Math & Coding Lab (Ms. Lezamiz\'s Room) - 2nd Floor',
    desc(){
      let s=`The computer screens are all blue-screening. The robot on Ms. Lezamiz's desk has toppled over, its camera-eye dark. Equations on the smartboard are dissolving into meaningless symbols.`;
      s+=`\n\nBut one screen still works. It displays a message:`;
      s+=`\n\n<span class="item">CONNECTION TO TWAIN_NETWORK... LOST</span>`;
      s+=`\n<span class="item">REBOOTING LANGUAGE CORE... FAILED</span>`;
      s+=`\n<span class="item">WORDS REMAINING: ${5-S.quotesFound} QUOTES MISSING</span>`;
      if(flag('conorHere')){
        s+=`\n\n<span class="chr">Conor</span> is trying to reboot the robot. <span class="chr">"The whole network runs on Twain's words. They're like... the operating system of the magic. Without them, everything crashes."</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{n:'second_floor'}
  },

  art_studio:{name:'The Art Studio - 3rd Floor',
    desc(){
      let s=`The art studio looks exactly like it did a year ago. Easels. Canvases. Student paintings.`;
      s+=`\n\nAnd there, on the far wall, a mural. A figure trapped inside it, pressing painted hands against the canvas from within, mouth open in a silent shout.`;
      if(!flag('fakeout1')){
        s+=`\n\n<span class="err">Wait. You've seen this before. EXACTLY this. Last year. Someone trapped in a mural. You saved Annabel this way.</span>`;
        s+=`\n\n<span class="hint">But... that's Annabel sitting right behind you in the creative writing room. So who is THAT in the painting?</span>`;
        if(hasItem('turpentine')){
          s+=`\n\n<span class="hint">You have turpentine. You could USE it on the mural... but should you?</span>`;
        }
      } else {
        s+=`\n\nThe fake mural has dissolved into a puddle of paint on the floor. The school tried to trick you. It didn't work.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{w:'third_floor'}
  },

  third_floor:{name:'3rd Floor Hallway',
    desc(){
      let s=`The third floor artwork has stopped moving. The sketched birds are frozen mid-flight. The painted waves are still. The charcoal cat is just a drawing now.`;
      s+=`\n\nBut the hallway itself is SHIFTING. You swear the walls are an inch closer than they were a moment ago. The ceiling feels lower. The school is squeezing, contracting, like a fist closing around you.`;
      s+=`\n\n<span class="atm">You remember this hallway from last year--how the art came alive, how Spud appeared around corners. This year, the hallway remembers you too. And it's not happy about what happened last time.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{n:'science_lab',e:'art_studio',s:'black_box',d:'second_floor',u:'rooftop'}
  },

  science_lab:{name:"Science Lab (Ms. Roman's Room) - 3rd Floor",
    desc(){
      let s=`The beakers have stopped bubbling. The Bunsen burners are cold. Jerry the skeleton sits in the corner, motionless--just a regular skeleton now. The periodic table has rearranged itself into a single word: <span class="err">SILENCE</span>.`;
      if(!flag('turpTaken')){
        s+=`\n\nOn the high shelf, between bottles of frozen chemicals, you spot a bottle of <span class="item">turpentine</span>. Same shelf as last year.`;
        s+=`\n\n<span class="atm">The school WANTS you to take it. That thought arrives unbidden and certain.</span>`;
      }
      if(!flag('forkTaken')){
        s+=`\n\nOn Ms. Roman's desk, half-hidden under papers, is a <span class="item">tuning fork</span>. It vibrates faintly, as if remembering sound.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{s:'third_floor'}
  },

  black_box:{name:'The Black Box Theater - 3rd Floor',
    desc(){
      let s=`The black box theater is darker than dark. Your flashlight barely penetrates. The spotlight that once waited for a performer is dead.`;
      s+=`\n\nThe drama masks on the wall are frozen in identical expressions of fear. The props are scattered: the cardboard crown crumpled, the rubber sword bent, the paper towel telescope crushed.`;
      s+=`\n\n<span class="atm">You remember standing in this spotlight last year, remembering your autism awareness speech about Sasha. The courage it took. The spotlight remembers too. It's trying to come back on, but something is swallowing the light.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{n:'third_floor'}
  },

  courtroom:{name:'The Mock Courtroom - 1st Floor',
    desc(){
      let s=`The courtroom gavel lies still on the bench. No ghost judges, no invisible cases. The Constitution on the wall has gone blank--just an empty frame with a blank sheet of paper. The jury box is empty.`;
      if(!flag('q5')&&flag('act2')){
        s+=`\n\nBut something new has appeared on the judge's bench: a leather-bound journal. The cover reads: <span class="item">"CASE FILE: THE SCHOOL VS. SLEEP"</span>`;
        s+=`\n\n<span class="hint">You could READ the case file.</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{w:'lobby'}
  },

  rooftop:{name:'The Rooftop',
    desc(){
      let s=`The rooftop view tonight is heartbreaking. Coney Island is going dark. The Wonder Wheel has stopped turning. The Cyclone is silent. The neon signs along Surf Avenue blink out one by one, like stars dying.`;
      s+=`\n\nThe ocean is still there, still crashing, still glittering. The ocean doesn't run on magic or words. The ocean just IS.`;
      s+=`\n\nBut the boardwalk lights are fading fast.`;
      if(flag('sophiaHere')){
        s+=`\n\n<span class="chr">Sophia</span> stands at the railing, watching the lights go out. <span class="chr">"Last year the magic leaked OUT of the school. This year it's being pulled back IN. The school is hoarding it."</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{d:'third_floor'}
  },

  basement:{name:'The Basement',
    desc(){
      let s=`Dark, damp, and smelling of old pipes. The boiler groans. The dusty shelves hold their decades of forgotten supplies. The Dreamland poster has faded to almost nothing.`;
      s+=`\n\n<span class="chr">Mr. Whiskers</span> sits on his overturned bucket, but tonight he's not polishing a wrench. He's WORRIED. His amber eyes dart back and forth. His whiskers twitch.`;
      s+=`\n\n<span class="tw">"Mrrr. It's different this time. The school is AWAKE. Not the magic in the school--the school ITSELF. The bricks, the pipes, the foundation. It felt what you did last year. It doesn't want to sleep again. Mrrr."</span>`;
      if(!flag('mirrorTaken')){
        s+=`\n\nA cracked <span class="item">mirror shard</span> leans against the wall, reflecting your flashlight beam into strange angles. It seems to show things that aren't quite there.`;
      }
      if(!flag('fakeout2')){
        s+=`\n\nAnd there, against the far wall... a heavy wooden box with a combination lock. Just like last year.`;
        s+=`\n\n<span class="atm">Your fingers twitch toward it. 23-9-42, you remember. But Mr. Whiskers is shaking his head slowly.</span>`;
      } else {
        s+=`\n\nThe decoy box lies in splinters. Nothing but sawdust inside.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{u:'cafeteria'}
  },

  // ===== CONEY ISLAND (ACT 2) =====
  neptune_ave:{name:'Neptune Avenue',
    desc(){
      let s=`Neptune Avenue at midnight. The streetlights don't flicker this year--they're OUT. The only light comes from your flashlight and the faint, dying glow of Coney Island to the south.`;
      s+=`\n\nThe school looms behind you, its windows dark except for a single green pulse, deep inside, like a heartbeat.`;
      s+=`\n\nNo Mark Twain materializes to guide you. No tips of hats. No quotes. He's in there somewhere, voiceless, waiting.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'lobby',s:'surf_ave'}
  },

  surf_ave:{name:'Surf Avenue',
    desc(){
      let s=`Surf Avenue is dark. The storefronts don't dream of summer crowds tonight--they're just shuttered and cold. The ghost bus that once cycled through fictional destinations is gone. Just an empty bus stop.`;
      s+=`\n\nBut you can hear the ocean. You can always hear the ocean from here.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'neptune_ave',s:'boardwalk',w:'nathans',e:'stillwell'}
  },

  boardwalk:{name:'The Boardwalk',
    desc(){
      let s=`The Riegelmann Boardwalk stretches east and west, silver planks in dying moonlight. The ocean crashes to the south. But the boardwalk is different tonight.`;
      s+=`\n\nEvery bench has a word carved into it. Single words, scattered in no particular order: <span class="item">FIND</span>... <span class="item">BORN</span>... <span class="item">YOUR</span>... <span class="item">DAYS</span>...`;
      if(!flag('q5')){
        s+=`\n\nThere must be twenty benches, each with a single word. Together they form something. A sentence. A quote. But you'd need to walk the whole boardwalk to read them all, and then piece them together yourself.`;
        s+=`\n\n<span class="hint">EXAMINE the benches to read all the words. Then ARRANGE them into the correct quote.</span>`;
      } else {
        s+=`\n\nThe benches glow golden where the quote was reassembled. The boardwalk hums.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{n:'surf_ave',e:'luna_park',w:'aquarium',s:'beach'}
  },

  beach:{name:'The Beach',
    desc(){
      let s=`Cold sand underfoot. The Atlantic rolls in, but the bioluminescence from last year is gone. The water is dark. The phosphorescent organisms are sleeping, like everything else.`;
      s+=`\n\nA message in a bottle washes up. This time it doesn't wash back out. It stays.`;
      if(!flag('bottleRead')){
        s+=`\n\n<span class="hint">You could READ the bottle.</span>`;
      } else {
        s+=`\n\nThe empty bottle sits in the sand where you left it.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{n:'boardwalk'}
  },

  luna_park:{name:'Luna Park',
    desc(){
      let s=`Luna Park is still. The Cyclone doesn't rattle. The Wonder Wheel doesn't turn. The carnival barker's booth is empty--no ghost, no straw hat, no riddle.`;
      if(!flag('q2')){
        s+=`\n\nBut the <span class="item">Cyclone</span> has words carved into its wooden tracks. You can see them glinting in the moonlight, running along the rails like a sentence on a roller coaster. To read them, you'd have to RIDE it.`;
        s+=`\n\n<span class="hint">Type RIDE CYCLONE to climb aboard.</span>`;
      } else {
        s+=`\n\nThe Cyclone's tracks glow faintly where the quote was inscribed. The carousel has started turning, slowly, playing a music-box tune.`;
      }
      return s+exits_text(this.exits);
    },

// ===== EXAMINE =====
function getExamine(target){
  const r=S.room;
  const t=target.toLowerCase().replace(/^(the|a|an) /,'');

  // Global
  if(match(t,['self','myself','me','lola']))
    return `You're Lola. You're thirteen now. Your long dark hair is longer. Your backpack is somehow even heavier. You won a borough-wide creative writing award this year. You've beaten this school once before, at midnight, and you'll do it again.`;
  if(match(t,['backpack','bag','pack']))
    return `Same backpack, one year heavier. Now it contains: textbooks, binders, your AWARD-WINNING creative writing portfolio, three pens, a water bottle, a crushed granola bar, and the psychological weight of having saved a school from supernatural crisis at age twelve. Just normal stuff.`;
  if(match(t,['flashlight','light','torch']))
    return `Same flashlight from last year. You started keeping it in your bag permanently. Just in case.`;
  if(match(t,['phone','yondr','pouch']))

// ===== COMMANDS =====
function handleInput(raw){
  if(!raw||!raw.trim())return;
  S.turns++;
  S.history.push(raw);
  S.histIdx=S.history.length;
  const input=raw.trim();
  print(`<span class="cmd-echo">&gt; ${escHtml(input)}</span>`);
  printBlank();

  const lower=input.toLowerCase().replace(/[?.!,]/g,'').trim();
  const words=lower.split(/\s+/);
  const verb=words[0];
  const rest=words.slice(1).join(' ');

  // Movement
  if(['go','move','walk','run','head'].includes(verb))return go(rest);
  if(['n','north'].includes(verb))return go('n');
  if(['s','south'].includes(verb))return go('s');
  if(['e','east'].includes(verb))return go('e');
  if(['w','west'].includes(verb))return go('w');
  if(['u','up','upstairs'].includes(verb))return go('u');
  if(['d','down','downstairs'].includes(verb))return go('d');

  // Core actions
  if(['look','l'].includes(verb))return showRoom();
  if(['examine','x','inspect','study'].includes(verb))return examine(rest);
  if(['take','get','grab','pick','pickup'].includes(verb))return take(rest==='up'?words.slice(2).join(' '):rest);
  if(['drop','leave','discard'].includes(verb))return drop(rest);
  if(['use','apply'].includes(verb))return use(rest);
  if(['give','hand','offer'].includes(verb))return give(rest);
  if(['talk','speak','chat'].includes(verb)){
    let who=rest.replace(/^to /,'');
    return talk(who);
  }
  if(['read','open'].includes(verb))return doRead(rest);
  if(['answer'].includes(verb))return doAnswer(rest);
  if(['arrange','spell','order','assemble'].includes(verb))return doArrange(input.substring(input.indexOf(' ')+1).trim());

  // New mechanics
  if(['play'].includes(verb))return doPlay(rest);
  if(['listen','hear'].includes(verb))return doListen();
  if(['face'].includes(verb))return doFace(rest);
  if(['ride','board'].includes(verb))return doRide(rest);
  if(['ignore','refuse','reject','skip'].includes(verb))return doIgnore(rest);
  if(['think','reflect','remember'].includes(verb))return doThink();
  if(verb==='ask')return doAsk(rest);

  // Meta
  if(['inventory','i','inv'].includes(verb))return doInventory();
  if(['help','h','?'].includes(verb))return doHelp();
  if(['map','m'].includes(verb))return doMap();
  if(['save'].includes(verb))return doSave();
  if(['load','restore'].includes(verb))return doLoad();
  if(['restart'].includes(verb))return doRestart();
  if(['score'].includes(verb))return print(`Quotes restored: ${S.quotesFound} of 5.`);

  // Atmosphere
  if(['sing'].includes(verb))return print(`You sing a few bars. Your voice echoes differently in the silenced school--louder, almost defiant. The walls seem to lean away from the sound.`);
  if(['dance'].includes(verb))return print(`You dance in the flashlight beam. For a moment, the shadows retreat. Even in a crisis, dancing helps.`);
  if(['jump'].includes(verb))return print(`You jump. The floor creaks. The school flinches. Good. Let it know you're here.`);
  if(['wait'].includes(verb))return print(`You wait. The school waits back. It's patient. You'll have to be more patient.`);
  if(['hug'].includes(verb)){
    if(flag('annabelHere')&&S.room==='creative_writing')return print(`You hug Annabel. She hugs back, hard. <span class="chr">"We did this before. We'll do it again."</span> She's right.`);
    if(flag('conorHere')&&(S.room==='lobby'||S.room==='gym'))return print(`You hug Conor. He pats your backpack awkwardly. <span class="chr">"Team effort, right?"</span> Right.`);
    if(flag('sophiaHere')&&(S.room==='library'||S.room==='rooftop'))return print(`You hug Sophia. She squeezes back. <span class="chr">"The words will come back. They have to."</span>`);
    return print(`There's nobody here to hug. You hug your backpack instead. It's been through a lot.`);
  }
  if(['scream','yell','shout'].includes(verb))return print(`You scream into the dark school. The echo comes back changed--it sounds like YOUR voice, but from last year. Younger. Braver? No. Just as brave. You're the same Lola. One year older, same courage.`);
  if(['eat'].includes(verb))return print(`You find the crushed granola bar in your backpack. You eat it. It tastes like determination and chocolate chips. Not bad.`);
  if(['smell','sniff'].includes(verb))return print(`The school smells different tonight. Less floor wax, more... stone? Like a building breathing. Like walls that are alive.`);

  print(`I don't understand "${escHtml(words[0])}." Type HELP for commands.`,'err');
}

// ===== MOVEMENT =====
function go(dir){
  if(!dir)return print(`Go where? Try N, S, E, W, U, or D.`);
  const dirMap={n:'n',north:'n',s:'s',south:'s',e:'e',east:'e',w:'w',west:'w',u:'u',up:'u',d:'d',down:'d'};
  const d=dirMap[dir.toLowerCase()]||dir.toLowerCase();
  const rm=rooms[S.room];
  if(!rm||!rm.exits)return print(`You can't go that way.`,'err');
  const dest=rm.exits[d];
  if(!dest)return print(`You can't go that way.`,'err');

  // Act 2 gate
  if(dest==='neptune_ave'&&!flag('act2')){
    return print(`The front doors are sealed. Not with moonlight this time--with the absence of words. There's no concept of "outside" in the school's vocabulary right now. You need to restore more of Twain's voice first.`);
  }

  S.room=dest;
  S.visited.add(dest);

  // First visit to certain rooms triggers events
  if(dest==='cafeteria'&&!flag('foundFriends')){
    setFlag('foundFriends');
    setFlag('annabelHere');setFlag('sophiaHere');setFlag('conorHere');
    printBlank();
    print(`Three shapes huddle around a cafeteria table, lit by phone flashlights. Wait--not phones. Their Yondr pouches are locked too. They're using actual flashlights. Who carries flashlights to school?`);
    printBlank();
    print(`People who've been through a midnight event before.`);
    printBlank();
    print(`<span class="chr">"LOLA!"</span> Three voices at once.`);
    printBlank();
    print(`<span class="chr">Annabel</span> jumps up, her blue-tipped blonde hair swinging. <span class="chr">"We fell asleep studying for the math final. And then--everything went quiet. Like, SCARY quiet. No ghosts, no magic, just... silence."</span>`);
    printBlank();
    print(`<span class="chr">Sophia</span> pushes her glasses up. <span class="chr">"The books are going blank, Lola. The BOOKS. Something is eating the words."</span>`);
    printBlank();
    print(`<span class="chr">Conor</span> cracks his knuckles. <span class="chr">"So. We doing this again?"</span>`);
    printBlank();
    print(`You fill them in on Twain's note. Five quotes stolen. The school itself is the enemy.`);
    printBlank();
    print(`Annabel nods. <span class="chr">"I'll scout the art studio and creative writing room."</span>`);
    print(`Sophia heads for the library. <span class="chr">"If there are words to save, that's where I need to be."</span>`);
    print(`Conor rolls his neck. <span class="chr">"I'll check the lobby and gym. See if there's a way out."</span>`);
    printBlank();
    print(`<span class="win">Your friends will appear in different rooms. TALK to them for hints!</span>`);
    showRoom();
    return;
  }

  if(dest==='art_studio'&&!flag('fakeout1')&&!flag('visitedArt')){
    setFlag('visitedArt');
    showRoom();
    printBlank();
    print(`<span class="err">Wait. Your stomach drops. The mural. The trapped figure. This is EXACTLY what happened last year.</span>`);
    printBlank();
    print(`<span class="atm">But you're smarter now. You've played this game before. And you know: the school has played it too.</span>`);
    return;
  }

  showRoom();

  // Atmosphere
  if(S.turns%5===0&&!flag('act2')){
    const atmos=[
      `The walls creak. Not settling--ADJUSTING. The school is watching.`,
      `A fluorescent light flickers on, then off again. Testing you.`,
      `You hear your own footsteps echo back from a hallway you're not in.`,
      `The floor tilts, just barely, just for a moment. Then straightens. Pretending nothing happened.`,
      `A locker door opens slowly, shows you darkness, then closes. An invitation you decline.`,
      `The air pressure changes. Your ears pop. The school just took a breath.`,
      `Somewhere, a clock runs backward. Then forward. Then gives up entirely.`
    ];
    printBlank();
    print(atmos[Math.floor(Math.random()*atmos.length)],'atm');
  }
}

function showRoom(){
  const rm=rooms[S.room];
  if(!rm)return;
  printBlank();
  print(`<span class="room">${rm.name}</span>`);
  print(rm.desc());
}

// ===== EXAMINE =====
function examine(what){
  if(!what)return print(`Examine what? Look around and try EXAMINE [something].`);
  const result=getExamine(what);
  if(result)return print(result);
  // Try room look
  if(match(what,['room','around','here','area','surroundings']))return showRoom();
  print(`You don't see that here, or there's nothing special about it.`);

// ===== USE =====

    if(idx!==-1){item=rest.slice(0,idx).trim();target=rest.slice(idx+prep.length).trim();break;}

// ===== ASK =====
function doAsk(rest){
  if(!rest)return print(`Ask whom about what? Try ASK [person] ABOUT [topic].`);
  const aboutIdx=rest.indexOf(' about ');
  if(aboutIdx===-1)return print(`Try ASK [person] ABOUT [topic].`);
  const who=rest.slice(0,aboutIdx).trim();
  const topic=rest.slice(aboutIdx+7).trim();
  // Route to talk for now, with topic awareness
  if(match(who,['annabel','sophia','conor','whiskers','mr whiskers','octopus','lunch lady']))
    return talk(who);
  print(`You can't ask them about that.`);
}

function doSave(){

function doLoad(){
  try{
    const data=localStorage.getItem('midnight_talent_show_2_save');
    if(!data)return print(`<span class="err">No saved game found.</span>`);
    const d=JSON.parse(data);
    S.room=d.room;S.inv=d.inv;S.quotesFound=d.quotesFound;S.turns=d.turns;
    S.visited=new Set(d.visited);S.flags=d.flags;S.noteSequence=d.noteSequence||[];
    S.history=[];S.histIdx=-1;
    print(`<span class="win">Game loaded!</span>`);

}

// ===== BOOT SEQUENCE =====
function typeLine(text,cls,delay){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const p=document.createElement('p');
      if(cls)p.className=cls;
      p.style.opacity='0';
      p.innerHTML=text;
      out.appendChild(p);
      requestAnimationFrame(()=>{p.style.transition='opacity 0.15s';p.style.opacity='1';});
      out.scrollTop=out.scrollHeight;
      resolve();
    },delay);
  });
}

// ===== EVENT LISTENERS =====
cmdInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    if(document.getElementById('in').style.visibility==='hidden')return;
    const val=cmdInput.value;
    cmdInput.value='';
    handleInput(val);
    updateBar();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(S.histIdx>0){S.histIdx--;cmdInput.value=S.history[S.histIdx];}
    else if(S.history.length>0){S.histIdx=0;cmdInput.value=S.history[0];}
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(S.histIdx<S.history.length-1){S.histIdx++;cmdInput.value=S.history[S.histIdx];}
    else{S.histIdx=S.history.length;cmdInput.value='';}
  }
});

init();
