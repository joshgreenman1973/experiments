<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE MIDNIGHT TALENT SHOW - A Text Adventure at Mark Twain IS 239</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#33ff33;font-family:'IBM Plex Mono','Courier New',monospace;font-size:15px;line-height:1.7;overflow:hidden}
#game{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:820px;margin:0 auto}
#bar{padding:6px 14px;border-bottom:1px solid #1a5c1a;color:#22aa22;font-size:13px;display:flex;justify-content:space-between;flex-shrink:0}
#out{flex:1;overflow-y:auto;padding:14px;scroll-behavior:smooth}
#out::-webkit-scrollbar{width:6px}
#out::-webkit-scrollbar-track{background:#0a0a0a}
#out::-webkit-scrollbar-thumb{background:#1a5c1a;border-radius:3px}
#in{display:flex;align-items:center;padding:8px 14px;border-top:1px solid #1a5c1a;flex-shrink:0}
#in .p{color:#33ff33;margin-right:8px;font-weight:bold;font-size:17px}
#cmd{background:transparent;border:none;color:#33ff33;font-family:inherit;font-size:inherit;outline:none;flex:1;caret-color:#33ff33}
.room{color:#ffdd33;font-weight:bold}
.item{color:#ff9933}
.chr{color:#33ffdd}
.tw{color:#dd99ff;font-style:italic}
.err{color:#ff4444}
.win{color:#33ff99;font-weight:bold}
.sys{color:#888}
.atm{color:#556655;font-style:italic}
.hint{color:#6699aa}
.cmd-echo{color:#1a8a1a}
p{margin:0 0 6px 0}
#game::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,rgba(0,0,0,0.12) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:10}
@media(max-width:600px){body{font-size:13px}#out{padding:10px}}
</style>
</head>
<body>
<div id="game">
<div id="bar"><span id="score">Score: 0/100</span><span id="loc"></span><span id="turns">Turns: 0</span></div>
<div id="out"></div>
<div id="in"><span class="p">&gt;</span><input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false" autocapitalize="off"></div>
</div>
<script>
// ========================================================
//  THE MIDNIGHT TALENT SHOW
//  A Text Adventure at Mark Twain IS 239, Coney Island
//  For Lola, on the occasion of turning 12
// ========================================================

// ===== STATE =====
let S = {
  room:'lobby', inv:['flashlight','backpack'], score:0, turns:0,
  visited:new Set(), flags:{}, history:[], histIdx:-1
};

function flag(f){ return !!S.flags[f]; }
function setFlag(f){ S.flags[f]=true; }

// ===== ROOMS =====
const exits_text = (e) => {
  const labels=[];
  const dirs={n:'North',s:'South',e:'East',w:'West',u:'Up',d:'Down'};
  for(const[d,r] of Object.entries(e)){
    if(d==='s' && r==='_front_doors' && !flag('act2')) continue;
    const rn = rooms[r]||rooms[r.replace('_front_doors','')];
    const name = r==='_front_doors'?(flag('act2')?'Neptune Avenue':'Front Doors (SEALED)'):
      (rn?rn.name:'???');
    labels.push(`<span class="room">${dirs[d]}</span> (${name})`);
  }
  return labels.length?`\nExits: ${labels.join(', ')}.`:'';
};

const rooms = {
  lobby:{name:'Main Lobby - 1st Floor',
    desc(){
      let s=`The main lobby of IS 239 smells like floor wax and old ambition. Trophy cases line the walls, stuffed with decades of academic glory. A massive banner reads: <span class="item">"EXPLORE. DREAM. DISCOVER."</span> A portrait of Mark Twain hangs above the front doors, his mustache so enormous it could have its own zip code.`;
      if(!flag('metTwain'))s+=` His painted eyes follow you. Something feels... off.`;
      if(flag('fridaySnacks'))s+=` A folding table near the stairs still has crumbs from today's Friday snack sale.`;
      else s+=` A folding table near the stairs still has crumbs from the Friday snack sale.`;
      s+=` The auditorium doors loom to the north. Through the east corridor you can see the mock courtroom, and to the west, double doors lead to the gymnasium. The main staircase leads up. Your calves ache just looking at it.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'auditorium',e:'courtroom',w:'gym',s:'_front_doors',u:'second_floor'}
  },

  auditorium:{name:'The Auditorium - 1st Floor',
    desc(){
      let s=`The auditorium stretches out in rows of creaky folding seats. The stage is lit by a single flickering spotlight. Heavy red curtains frame the proscenium, moth-eaten but still dramatic. Two theatrical masks—Comedy and Tragedy—are mounted above the stage. Comedy just winked at you. A grand piano in the orchestra pit plays occasional notes to itself.`;
      if(flag('allRescued')&&!flag('gameWon'))s+=`\n\n<span class="chr">Mark Twain</span> stands on stage, arms wide. <span class="tw">"You've found your friends! Now—let's put on a SHOW. Use your three gifts on the stage."</span>`;
      if(flag('gameWon'))s+=`\n\nThe stage is quiet now. A single white page rests in the spotlight.`;
      return s+exits_text(this.exits);
    },
    exits:{s:'lobby',w:'music_room'}
  },

  cafeteria:{name:'The Cafeteria - 2nd Floor',
    desc(){
      let s=`The cafeteria assaults your nose with the combined ghost-aroma of ten thousand school lunches served at 10:30 in the morning. Long folding tables stretch across the room, scarred with carved initials. Behind the serving counter, heat lamps glow over trays of food that should NOT still be here. A slice of pizza waves a pepperoni at you. A milk carton makes uncomfortable eye contact.`;
      s+=` A ghostly lunch lady stands behind the counter, ladle at the ready.`;
      s+=`\n\n<span class="atm">A sign reads: "LUNCH PERIOD 5 — 10:37 AM." Only at IS 239 do you eat lunch before some people eat breakfast.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{s:'second_floor',d:'basement'}
  },

  library:{name:'The Library - 2nd Floor',
    desc(){
      let s=`Floor-to-ceiling bookshelves create a labyrinth of knowledge and dust. The books whisper to each other: <span class="atm">"page 47 is my best work"</span> and <span class="atm">"my spine hurts."</span>`;
      if(!flag('sophiaFreed')){
        s+=`\n\nIn the center of the library, at a reading table, sits <span class="chr">Sophia</span>. Her medium-length dark hair hangs over an enormous leather-bound book that glows faint purple. Her eyes are locked on the pages—she can't stop reading. She mouths the word <span class="item">"help"</span> without looking up.`;
      } else {
        s+=`\n\nThe reading table where Sophia was trapped is empty now. The enchanted book lies closed, harmless.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{w:'second_floor'}
  },

  gym:{name:'The Gymnasium - Ground Floor',
    desc(){
      let s=`The IS 239 gymnasium—the one room in the building that doesn't smell like textbooks. The polished hardwood floor gleams under flickering lights. Championship banners hang from the rafters: BROOKLYN BOROUGH CHAMPS 2014, CYO RUNNERS UP 2019. Retractable bleachers line both walls. It echoes with phantom sneaker-squeaks and the rhythmic bounce of invisible basketballs.`;
      if(!flag('conorFreed')){
        s+=`\n\nIn the center of the court, <span class="chr">Conor</span> dribbles desperately against invisible opponents. His short dark hair is plastered with sweat. Cold rushes of air streak past as ghost players run circles around him. The scoreboard reads: <span class="item">PHANTOMS 98, CONOR 12. TIME REMAINING: FOREVER.</span> He looks exhausted but the game won't let him stop.`;
      } else {
        s+=` The court is peaceful now. The scoreboard reads: <span class="win">CONOR 100, PHANTOMS 98. FINAL.</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'lobby'}
  },

  basement:{name:'The Basement',
    desc(){
      let s=`Dark, damp, and smelling of old pipes and history. A boiler the size of a small car clanks and groans in the corner. Dusty shelves hold decades of forgotten school supplies—chalk stubs, overhead projector transparencies, VHS tapes labeled things like <span class="item">"EDUCATIONAL FILMSTRIP 1974."</span>`;
      s+=` A faded poster advertises <span class="item">"DREAMLAND AMUSEMENT PARK — 1904."</span>`;
      if(!flag('boxOpened')){
        s+=` A heavy wooden box with a combination lock sits against the far wall, covered in cobwebs.`;
      } else if(!flag('sneakersTaken')){
        s+=` The wooden box hangs open. Inside, a pair of old sneakers gathers dust.`;
      } else {
        s+=` The wooden box hangs open, empty now.`;
      }
      s+=`\n\n<span class="chr">Mr. Whiskers</span>, the night janitor, sits on an overturned bucket, polishing a wrench. He is either a man who looks remarkably like a cat, or a cat who looks remarkably like a man. Hard to say.`;
      return s+exits_text(this.exits);
    },
    exits:{u:'cafeteria'}
  },

  second_floor:{name:'2nd Floor Hallway',
    desc(){
      let s=`The second floor hallway stretches east and west under buzzing fluorescents that can't commit to being on or off. A banner reads <span class="item">"MARK TWAIN IS 239 — WHERE TALENT MEETS OPPORTUNITY"</span> but someone has scrawled underneath in dripping red marker: <span class="err">"...AND OPPORTUNITY MEETS MIDNIGHT."</span>`;
      s+=` Student writing and book reports line the walls in display cases. One report appears to be rewriting itself in real time.`;
      s+=`\n\n<span class="atm">The stairs groan under your feet. Four flights a day with a fifty-pound backpack and no lockers. IS 239 doesn't build character—it builds CALVES.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{n:'cafeteria',e:'library',w:'creative_writing',s:'math_room',d:'lobby',u:'third_floor'}
  },

  science_lab:{name:'Science Lab (Ms. Roman\'s Room) - 3rd Floor',
    desc(){
      let s=`Beakers bubble and Bunsen burners flicker despite no one tending them. A skeleton model in the corner keeps adjusting its own femur. The periodic table on the wall has rearranged itself into what appears to be a recipe for pizza.`;
      if(!flag('turpTaken')){
        s+=` On a high shelf, between bottles labeled <span class="item">"ESSENCE OF MONDAY"</span> and <span class="item">"LIQUID HOMEWORK,"</span> you spot a bottle of <span class="item">industrial-strength turpentine</span>.`;
      }
      s+=`\n\nA note on Ms. Roman's desk reads: <span class="item">"PLEASE DO NOT FEED THE SKELETON."</span>`;
      return s+exits_text(this.exits);
    },
    exits:{s:'third_floor'}
  },

  math_room:{name:'Math & Coding Lab (Ms. Lezamiz\'s Room) - 2nd Floor',
    desc(){
      let s=`Banks of computers line the walls, screens casting an eerie blue glow. Desks arranged in perfect geometric patterns. A poster reads: <span class="item">"MATH: THE ONLY SUBJECT WHERE YOU BUY 60 WATERMELONS AND NO ONE ASKS WHY."</span>`;
      if(!flag('mathSolved')){
        s+=`\n\nOn the main smartboard, equations scroll too fast to read—except one, frozen dead center, pulsing with light:\n\n<span class="item">    ╔═══════════════════════════════════╗\n    ║  SOLVE FOR ACCESS:  6 × 7 = ?   ║\n    ╚═══════════════════════════════════╝</span>\n\nType <span class="hint">ANSWER [number]</span> to attempt a solution.`;
      } else {
        s+=`\n\nThe smartboard displays: <span class="win">ACCESS GRANTED. COMBINATION: 23-9-42.</span>`;
      }
      s+=`\n\nA small robot on Ms. Lezamiz's desk swivels its camera-eye to watch you.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'second_floor'}
  },

  courtroom:{name:'The Mock Courtroom - 1st Floor',
    desc(){
      let s=`Someone transformed a regular classroom into a surprisingly convincing courtroom. A raised judge's bench, jury box, witness stand, and gallery seating. The gavel on the judge's bench occasionally bangs itself, ruling on invisible cases.`;
      s+=` A framed copy of the Constitution on the wall appears to be rewriting itself in real time.`;
      s+=`\n\nAbove the bench, carved in wood: <span class="item">"ORDER IN THE COURT."</span> Below it, someone penciled: <span class="atm">"Order in the CAFETERIA would be nice too."</span>`;
      return s+exits_text(this.exits);
    },
    exits:{w:'lobby'}
  },

  third_floor:{name:'3rd Floor Hallway',
    desc(){
      let s=`The third floor is where the talent magic happens, and tonight it's more literal than usual. Student artwork on the walls has come alive—sketched birds flutter from page to page, painted waves crash silently, and a charcoal cat stretches and yawns. Science projects in glass cases hum with energy. The display on black holes appears to be actually warping the space around it. The air smells like paint, chemicals, and just a hint of ocean salt from an open window somewhere.`;
      if(flag('spudSeen3'))s+=`\n\n<span class="atm">A cat that looks EXACTLY like Spud trots around the corner and vanishes. No—couldn't be. Spud is home in bed. ...Right?</span>`;
      return s+exits_text(this.exits);
    },
    exits:{n:'science_lab',e:'art_studio',s:'black_box',d:'second_floor',u:'rooftop'}
  },

  art_studio:{name:'The Art Studio - 3rd Floor',
    desc(){
      let s=`Easels and canvases fill the room. Student paintings line the walls—still lifes, self-portraits, Coney Island landscapes.`;
      if(!flag('annabelFreed')){
        s+=`\n\nBut the massive <span class="item">mural</span> on the far wall is anything but normal. It depicts the Coney Island boardwalk in vivid color—the Wonder Wheel, the Cyclone, cotton candy stands. And there, trapped within the painted scene, standing on the painted boardwalk, is <span class="chr">Annabel</span>. Her short blonde hair is rendered in bold brushstrokes. She's pressing her painted hands against the canvas from the inside, mouth open in a silent shout.`;
        s+=`\n\n<span class="hint">The paint looks thick and wet. If only you had something that could dissolve it...</span>`;
      } else {
        s+=`\n\nThe mural of Coney Island is still beautiful, but it's just a painting now. Normal. Still.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{w:'third_floor'}
  },

  music_room:{name:'The Music Room - 1st Floor',
    desc(){
      let s=`Instruments play themselves in a ghostly concert. A trumpet floats in midair, playing a Coney Island carousel tune. Drumsticks tap out a rhythm on a snare. Violins sway and bow on their own. The piano performs what sounds like the morning announcements set to jazz.`;
      s+=` Sheet music swirls around the room like paper butterflies.`;
      s+=`\n\nA metronome on a shelf ticks at a tempo that matches your heartbeat exactly. That's... unsettling.`;
      return s+exits_text(this.exits);
    },
    exits:{e:'auditorium'}
  },

  creative_writing:{name:'Creative Writing Room (Ms. O\'Brien\'s Room) - 2nd Floor',
    desc(){
      let s=`Words float through the air like snow. Sentence fragments drift lazily: <span class="atm">"once upon a..."</span> and <span class="atm">"the night was dark and..."</span> and <span class="atm">"she never expected the..."</span>`;
      s+=` An old typewriter on the desk clacks away by itself, adding to the blizzard of floating words. This is where you and Annabel write poetry together. This is where stories come alive. Tonight, a little too literally.`;
      if(!flag('riddleSolved')){
        s+=`\n\nOn the chalkboard, written in glowing silver chalk, is a riddle:\n\n<span class="item">    "I have keys but no locks,\n     space but no room,\n     and you can enter\n     but can't go inside.\n     What am I?"</span>\n\nType <span class="hint">ANSWER [your guess]</span> to solve it.`;
      } else {
        s+=`\n\nThe chalkboard riddle has been solved. The silver letters have rearranged into: <span class="win">"WELL DONE, WRITER."</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'second_floor'}
  },

  black_box:{name:'The Black Box Theater - 3rd Floor',
    desc(){
      let s=`The black box theater is exactly that—a room painted entirely black, floor to ceiling. Theater lights hang from a grid above, pointing in all directions but illuminating nothing. Props are scattered around: a cardboard crown, a rubber sword, a telescope made from a paper towel roll.`;
      s+=`\n\nA circle of light appears on the floor, as if waiting for someone to step into it and deliver a monologue. A drama mask on the wall whispers: <span class="tw">"All the world's a stage..."</span>`;
      s+=`\n\n<span class="atm">You remember your autism awareness speech—standing in a spotlight just like this one, talking about your sister Sasha. Three finalists in your cluster. Your heart hammering. The applause after. This spotlight remembers you too.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{n:'third_floor'}
  },

  rooftop:{name:'The Rooftop',
    desc(){
      let s=`The night air hits you like a cool wave off the Atlantic. The rooftop of IS 239 offers a breathtaking view of Coney Island at midnight.`;
      s+=`\n\nTo the south, the <span class="item">Wonder Wheel</span> turns slowly, lit with ghostly blue lights that shouldn't be on at this hour. The skeleton of the <span class="item">Cyclone</span> roller coaster stands against the moonlit sky. Beyond it all, the ocean stretches to the horizon, dark and glittering with reflected stars.`;
      s+=`\n\nThe <span class="item">boardwalk</span> below is empty. The salt breeze carries the faint smell of Nathan's Famous.`;
      s+=`\n\nUp here, with the wind and the stars, it's almost possible to forget that the school below you has gone completely insane.`;
      s+=`\n\n<span class="atm">Almost.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{d:'third_floor'}
  },

  // ===== CONEY ISLAND (ACT 2) =====
  neptune_ave:{name:'Neptune Avenue',
    desc(){
      let s=`You step through the front doors of IS 239 onto Neptune Avenue. The street is empty and eerie—streetlights flicker in sequence, as if something is running along the power lines. The school looms behind you, its windows glowing green.`;
      s+=`\n\nTo the south, the glow of Coney Island's amusement rides paints the sky in ghostly neon. The air smells of salt water and funnel cake and something you can't quite name.`;
      s+=`\n\n<span class="chr">Mark Twain</span> materializes beside you, looking out at the flickering lights. <span class="tw">"The show was magnificent. But the magic has leaked beyond the school. Coney Island itself is waking up. Find my three lost manuscript pages—scattered somewhere out there—and read them aloud on the boardwalk. That'll put everything to sleep for another fifty years."</span>`;
      s+=`\n\nHe tips his hat. <span class="tw">"The world owes you nothing. It was here first. But tonight, it owes you a favor."</span>`;
      return s+exits_text(this.exits);
    },
    exits:{n:'lobby',s:'surf_ave'}
  },

  surf_ave:{name:'Surf Avenue',
    desc(){
      let s=`Surf Avenue stretches east and west under buzzing streetlights. The storefronts are shuttered—souvenir shops, pizza joints, a tattoo parlor—but their signs glow with an inner light, as if dreaming of summer crowds.`;
      s+=`\n\nA city bus idles at the corner, empty, its destination sign cycling through stops that don't exist: <span class="item">"NARNIA... HOGWARTS... MORDOR... CONEY ISLAND MIDNIGHT EXPRESS."</span>`;
      s+=`\n\nThe smell of the ocean is stronger here. You can hear the surf.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'neptune_ave',s:'boardwalk',e:'stillwell',w:'nathans'}
  },

  boardwalk:{name:'The Boardwalk',
    desc(){
      let s=`The Riegelmann Boardwalk stretches east and west, its wooden planks silver in the moonlight. The ocean crashes and hisses to the south. Empty benches face the water. A ghostly seagull perches on a railing, regarding you with spectral indifference.`;
      s+=`\n\nTo the east, the lights of Luna Park flash and spin. To the west, the dark shape of the Aquarium hunkers against the night.`;
      if(flag('pg1')&&flag('pg2')&&flag('pg3')&&!flag('gameWon2')){
        s+=`\n\n<span class="hint">You have all three manuscript pages. You could READ MANUSCRIPT here, with the ocean as your audience...</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{n:'surf_ave',s:'beach',e:'luna_park',w:'aquarium'}
  },

  beach:{name:'The Beach',
    desc(){
      let s=`Your sneakers sink into cold sand. The Atlantic Ocean rolls in under the moon, each wave edged with phosphorescent light—tiny organisms glowing blue-green in the surf. It's breathtaking.`;
      s+=`\n\nThe boardwalk rises behind you to the north. Ahead, there's nothing but water and sky and the distant lights of ships.`;
      s+=`\n\nA <span class="item">message in a bottle</span> washes up at your feet, then washes back out, then washes up again, as if it can't decide.`;
      return s+exits_text(this.exits);
    },
    exits:{n:'boardwalk'}
  },

  luna_park:{name:'Luna Park',
    desc(){
      let s=`Luna Park is alive—rides spinning and lighting up with no one aboard. The <span class="item">Cyclone</span> rattles along its ancient wooden tracks, cars empty, screaming through turns. The <span class="item">Wonder Wheel</span> turns with glacial majesty, its cars swinging gently, lit from within by impossible colors.`;
      s+=`\n\nA carnival barker's booth stands at the entrance, but the barker is a ghost—translucent, wearing a straw hat and a grin too wide for his face.`;
      if(!flag('pg1')){
        s+=`\n\n<span class="chr">The Ghost Barker</span> calls out: <span class="tw">"Step right up! Answer my riddle and win a FABULOUS PRIZE! What has a heart that doesn't beat?"</span>`;
        s+=`\n\nType <span class="hint">ANSWER [your guess]</span> to try.`;
      } else {
        s+=`\n\nThe Ghost Barker's booth is dark. He gave you what you came for.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{w:'boardwalk'}
  },

  nathans:{name:'Nathan\'s Famous',
    desc(){
      let s=`The legendary Nathan's Famous hot dog stand glows like a beacon. The neon signs blaze: <span class="item">"SINCE 1916."</span> The counter is staffed by a single ghostly hot dog wearing a tiny top hat and monocle. It is, without question, the most dignified hot dog you have ever seen.`;
      if(!flag('pg2')){
        s+=`\n\n<span class="chr">Sir Frank N. Furter</span> (yes, that's the hot dog's name, don't ask) adjusts his monocle. <span class="tw">"I have something you need—a page from a very old manuscript. But I require something in trade. I've always wanted to be an artist. Bring me a PAINTBRUSH and I shall trade."</span>`;
      } else {
        s+=`\n\n<span class="chr">Sir Frank N. Furter</span> is painting a tiny canvas with your paintbrush. It's actually... pretty good? The hot dog has talent.`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'surf_ave'}
  },

  aquarium:{name:'New York Aquarium',
    desc(){
      let s=`The entrance to the New York Aquarium stands open, which it definitely should not be at midnight. Blue light ripples from within. You can hear... is that applause?`;
      s+=`\n\nInside the main hall, the tanks glow with bioluminescent light. Fish of every color swim in synchronized patterns. And in the central tank, an enormous <span class="chr">octopus</span> sits on a rock, wearing reading glasses and holding what appears to be a manuscript page in one of its eight arms.`;
      if(!flag('pg3')){
        s+=`\n\n<span class="chr">The Octopus</span> peers at you over its spectacles. <span class="tw">"Ah, a visitor! I'll give you this page, but first—TALK TO me. I've been alone all night and I have OPINIONS about literature."</span>`;
      } else {
        s+=`\n\nThe octopus waves a lazy tentacle at you. <span class="tw">"Come back anytime, darling. Visiting hours are whenever I say they are."</span>`;
      }
      return s+exits_text(this.exits);
    },
    exits:{e:'boardwalk'}
  },

  stillwell:{name:'Stillwell Avenue Terminal',
    desc(){
      let s=`The grand terminal of Stillwell Avenue rises around you—steel beams and glass, the hub of Coney Island transit. Platform signs list the D, F, N, and Q trains. At this hour, the station should be deserted, but a single subway car waits on the D train platform, its doors open and its interior light flickering.`;
      s+=`\n\nA ghost conductor leans out the window. <span class="tw">"D train to Manhattan. Next stop: Times Square. All aboard who's going aboard."</span>`;
      s+=`\n\nType <span class="hint">BOARD TRAIN</span> to ride.`;
      s+=`\n\n<span class="atm">You've waited on this platform a thousand mornings, backpack crushing your shoulders, eyes half-closed, headed home to Brooklyn after a long day of talents. But never at midnight. Never like this.</span>`;
      return s+exits_text(this.exits);
    },
    exits:{w:'surf_ave'}
  },

  times_square:{name:'Times Square',
    desc(){
      let s=`Times Square at midnight. The crossroads of the world—empty of people but blazing with light. Billboards flash and scroll, but their messages are... personal.`;
      s+=`\n\n<span class="item">"LOLA — HAPPY ALMOST-BIRTHDAY."</span>`;
      s+=`\n<span class="item">"HAVE YOU CALLED YOUR MOM AND DAD? NANCY AND JOSH WORRY."</span>`;
      s+=`\n<span class="item">"SPUD MISSES YOU. (HE'S A CAT. HE'LL NEVER ADMIT IT.)"</span>`;
      s+=`\n<span class="item">"THE MIDNIGHT TALENT SHOW — ONE NIGHT ONLY — MARK TWAIN IS 239"</span>`;
      s+=`\n\nThe city hums around you, vast and strange and beautiful. The ghost conductor waits in the subway entrance. <span class="tw">"Whenever you're ready to head back."</span>`;
      s+=`\n\nType <span class="hint">BOARD TRAIN</span> to return to Coney Island.`;
      return s+exits_text(this.exits);
    },
    exits:{}
  }
};

// ===== EXAMINE TARGETS =====
function getExamine(target){
  const r=S.room;
  const t=target.toLowerCase().replace(/^(the|a|an) /,'');

  // Global targets
  if(match(t,['self','myself','me','lola']))
    return `You're Lola. You have long dark hair, a heavy backpack, and a talent for creative writing. You're almost twelve. You're trapped in your school at midnight. You're handling it remarkably well, all things considered.`;
  if(match(t,['backpack','bag','pack']))
    return `Your backpack weighs approximately seven thousand pounds. You haul it up and down four flights of stairs every day because IS 239 doesn't believe in lockers. It contains: textbooks, binders, a water bottle, three pens, a crumpled permission slip, and the lingering essence of your dreams being crushed by its weight. Also a flashlight, which is currently saving your life.`;
  if(match(t,['flashlight','light','torch']))
    return `A small but sturdy flashlight. The beam flickers occasionally, as if it's nervous. Can you blame it?`;
  if(match(t,['yondr','pouch','phone','phone pouch','yondr pouch','device']))
    return `Your phone is sealed in its Yondr pouch. You try to pry it open. No luck. You try harder. Still nothing. The Yondr pouch is apparently immune to ghost magic, regular magic, AND desperate twelve-year-old strength. Some prisons are inescapable.`;
  if(match(t,['shoes','sneakers','old sneakers']) && hasItem('sneakers'))
    return `Battered old Chuck Taylors from what looks like the 1970s. They glow faintly. The label reads: "PROPERTY OF IS 239 ATHLETICS DEPT — DO NOT REMOVE." Oops.`;
  if(match(t,['turpentine','bottle','solvent']) && hasItem('turpentine'))
    return `A bottle of industrial-strength turpentine from the science lab. The label reads: "WARNING: DISSOLVES PAINT, ENCHANTMENTS, AND OCCASIONALLY THE FABRIC OF REALITY."`;
  if(match(t,['red pen','pen','marker']) && hasItem('red_pen'))
    return `A glowing red pen that appeared when you solved the riddle. It hums with editorial power. You can feel it wanting to correct things.`;
  if(match(t,['combo','combination','paper','slip','code']) && hasItem('combo'))
    return `A slip of paper from the smartboard. It reads: "COMBINATION: 23-9-42." The numbers seem to shimmer.`;
  if(match(t,['paintbrush','brush']) && hasItem('paintbrush'))
    return `Annabel's paintbrush. It sparkles with residual magic from the mural. Annabel said it's her lucky brush—she uses it for her best work.`;
  if(match(t,['notebook','poetry notebook']) && hasItem('notebook'))
    return `Sophia's poetry notebook, filled with half-finished verses and doodles in the margins. The last entry reads: "Poem idea: what if a school could dream?"`;
  if(match(t,['flash drive','drive','usb'] ) && hasItem('flash_drive'))
    return `Conor's flash drive, shaped like a tiny basketball. He says it contains "the greatest basketball simulation ever coded. Version 0.1. Known bugs: it traps you inside a gym."`;
  if(match(t,['manuscript','pages']) && hasItem('manuscript'))
    return `Three yellowed pages covered in Mark Twain's unmistakable handwriting. The text shimmers and shifts—you can make out phrases like "the moon over the water" and "the wheel turns" and "every talent, a light."`;

  // Room-specific targets
  switch(r){
    case 'lobby':
      if(match(t,['trophy','trophies','trophy case','case','cases']))
        return `Decades of achievement gleam behind smudged glass: Math Counts championships (2nd place!), Scholastic Writing Awards, debate trophies. A plaque reads "AUTISM AWARENESS SPEECH FINALISTS" and there's your name, LOLA, right there. That feels like a million years ago. You remember talking about Sasha, your little sister, and how the whole auditorium went quiet. Good quiet.`;
      if(match(t,['portrait','painting','mark twain','twain','picture']))
        return `Mark Twain stares down at you with painted eyes that DEFINITELY just moved. White suit, magnificent mustache, expression that says "I know something you don't." A plaque reads: <span class="item">"Samuel Langhorne Clemens, 1835-1910. More or less."</span>`;
      if(match(t,['banner','motto','sign']))
        return `"EXPLORE. DREAM. DISCOVER." The school motto. Tonight you'd settle for "SURVIVE. ESCAPE. NAP."`;
      if(match(t,['doors','front doors','exit','entrance']))
        return flag('act2')?`The front doors are open. The night air beckons.`:`The front doors shimmer with a force field made of condensed moonlight. You're not getting out this way. Not yet.`;
      if(match(t,['stairs','staircase','stairwell']))
        return `The main staircase leads up to the second floor. You've climbed these stairs approximately one million times. Your quads have quads.`;
      if(match(t,['floor','ground']))
        return `Scuffed linoleum. The collected sneaker-marks of generations of talented kids from every corner of Brooklyn.`;
      if(match(t,['table','snack','snacks','crumbs','snack sale']))
        return `The Friday snack sale table still has crumbs. You spot a forgotten bag of Takis wedged under the leg. The ghost of a fruit roll-up drifts past. Friday snack sales are the highlight of the week—the one time IS 239's hallways smell like something besides floor wax.`;
      if(match(t,['walls','wall']))
        return `Bulletin boards display announcements: "DRAMA PRODUCTION THIS WEEK!" "MATHCOUNTS PRACTICE - RM 204" "SCHOLASTIC WRITING DEADLINE FRIDAY" "REMEMBER YOUR YONDR POUCHES." The usual.`;
      break;
    case 'auditorium':
      if(match(t,['stage']))return `A wooden stage, worn smooth by a thousand performances. The spotlight waits.`;
      if(match(t,['curtains','curtain']))return `Red velvet, moth-eaten but dramatic. They smell like dust and drama. Literally.`;
      if(match(t,['masks','mask','comedy','tragedy']))return `Comedy grins. Tragedy weeps. Every few seconds they swap expressions. Comedy weeps and Tragedy grins. Then they swap back. It's like watching a very slow, very weird tennis match.`;
      if(match(t,['spotlight','light']))return `A single spotlight illuminates the center of the stage. It's warm. Inviting. Standing in it, you'd feel like the only person in the world. You've stood in spotlights like this before. You know the feeling.`;
      if(match(t,['piano']))return `A grand piano in the orchestra pit. Its keys press themselves occasionally, playing fragments of songs that almost sound familiar.`;
      if(match(t,['seats','chairs','chair','seat']))return `Rows of creaky folding seats. Each one has hosted hundreds of fidgeting students watching hundreds of talent shows. The cushions remember every squirm.`;
      if(match(t,['page','white page','paper']) && flag('gameWon'))return `A single white page rests in the spotlight. In elegant handwriting: "The secret of getting ahead is getting started. —MT"`;
      break;
    case 'cafeteria':
      if(match(t,['pizza','slice']))return `The pizza slice waves at you with a pepperoni. It looks friendly but you're not eating something that waves. That's a rule you just made up and you're sticking with it.`;
      if(match(t,['milk','milk carton','carton']))return `The milk carton stares at you. On its side, instead of a missing child, there's a picture of a missing GHOST with the caption: "HAVE YOU SEEN THIS SPECTER?" Below: "Last seen: haunting a school cafeteria at 10:37 AM."`;
      if(match(t,['lunch lady','ghost','mrs','lady']))return `The ghostly lunch lady adjusts her hairnet. She's been serving lunch at IS 239 since... well, since before she was a ghost, presumably. Her ladle drips with something that might be gravy. <span class="tw">"Hungry, dear? We have mystery meat. The mystery is that it's been here since 1985."</span>`;
      if(match(t,['clock']))return `The clock on the wall runs backwards. It currently says it's 7:30 in the morning. Which, given that IS 239 serves lunch at 10:37 AM, wouldn't even be that early for a meal around here.`;
      if(match(t,['sign','lunch sign']))return `"LUNCH PERIOD 5 — 10:37 AM." Kids from all over Brooklyn wake up at dawn to get here, and then eat lunch three hours later. The schedule was clearly designed by someone who has never met a human child.`;
      if(match(t,['tables','table']))return `Long folding tables covered in carved initials. You spot "L+A POETRY 4EVER" and realize that's you and Annabel. When did she carve that?`;
      break;
    case 'library':
      if(match(t,['sophia']) && !flag('sophiaFreed'))
        return `Sophia sits frozen at the reading table, her medium-length dark hair hanging over the glowing book. Her eyes scan the pages in a frantic loop. She's been like this for hours—the book won't let her stop. A single tear tracks down her cheek. She mouths: "It just keeps going..."`;
      if(match(t,['sophia']) && flag('sophiaFreed'))
        return `Sophia's not here—she went to find the others.`;
      if(match(t,['book','glowing book','enchanted book','purple book']))
        return !flag('sophiaFreed')?`The book is enormous, leather-bound, and glows a deep purple. The title shifts every time you try to read it: "THE NEVER-ENDING STORY" then "A STORY WITH NO END" then "YOU CAN'T STOP READING THIS." The pages turn themselves. Sophia's hands are stuck to it like magnets. <span class="hint">If only you had something that could EDIT the ending...</span>`:`The enchanted book lies closed on the table, just a book now. The title reads: "THE END." Finally.`;
      if(match(t,['books','shelves','bookshelves','bookshelf']))
        return `The shelves groan with books. You catch whispered conversations between them: "Did you hear about the dictionary? It got SHELVED." "That's not funny, Karen." "My NAME is War and Peace." You're not sure books should have this much personality.`;
      if(match(t,['sign']))return `A sign reads: "QUIET PLEASE — THE BOOKS ARE SLEEPING." Underneath, someone wrote: "no they're not, they're gossiping."`;
      break;
    case 'gym':
      if(match(t,['conor']) && !flag('conorFreed'))
        return `Conor's short dark hair is plastered with sweat. He dribbles, shoots, dribbles. His face is a mask of exhausted determination. "Lola!" he pants. "This stupid game—I was testing my basketball simulation code on the gym's smart scoreboard and it pulled me IN. I need faster shoes—these school shoes have ZERO grip on ghost hardwood!" <span class="hint">He needs better SNEAKERS.</span>`;
      if(match(t,['conor']) && flag('conorFreed'))
        return `Conor's resting on the bleachers, catching his breath and muttering about "beta testing."`;
      if(match(t,['scoreboard','score']))return !flag('conorFreed')?`PHANTOMS 98, CONOR 12. TIME REMAINING: FOREVER. The ghost team's mascot appears to be a skeleton doing a backflip. Harsh.`:`CONOR 100, PHANTOMS 98. FINAL. The ghost team's mascot is doing a sad skeleton slump. Justice.`;
      if(match(t,['bleachers','bench']))return `Standard gym bleachers. Splinter city. They've hosted decades of cheering parents and bored siblings.`;
      break;
    case 'basement':
      if(match(t,['box','wooden box','locked box']))
        return !flag('boxOpened')?`A heavy wooden box with a three-number combination lock. It's been down here for decades, judging by the cobweb situation. Whatever's inside, someone wanted it locked up tight. <span class="hint">If you had the COMBINATION, you could OPEN it...</span>`:`The box is open. ${flag('sneakersTaken')?'Empty now.':'A pair of old sneakers sits inside, faintly glowing.'}`;
      if(match(t,['whiskers','mr whiskers','janitor','man','cat']))
        return `Mr. Whiskers regards you with amber eyes. He's wearing coveralls and holding a wrench, which is very janitor-like. He also has whiskers, pointed ears, and pupils that contract to slits in the light, which is very cat-like. He cleans behind his ear with the back of his hand. <span class="tw">"Mrrr. I've been janitor here since 1975. I've seen things. Weird things. Not as weird as tonight, though."</span>`;
      if(match(t,['poster','dreamland']))return `"DREAMLAND AMUSEMENT PARK — 1904." Coney Island's first great amusement park. It burned down in 1911. The poster is faded but you can make out towers, elephants, and the tagline: "THE PLACE WHERE DREAMS COME TRUE." Guess they didn't dream about fire safety.`;
      if(match(t,['boiler']))return `The boiler clanks and groans like a sleeping giant. It's been heating this school since the 1930s. It has opinions about modern HVAC systems, all of them negative.`;
      if(match(t,['supplies','textbooks','shelves','vhs','tapes']))return `Ancient school supplies: chalk stubs, overhead projector transparencies (ask your parents), and VHS tapes including "MATHEMATIC ADVENTURES WITH PROFESSOR CALCULUS (1974)" and "THE EXCITING WORLD OF SEDIMENTARY ROCKS." The word "exciting" is doing a LOT of heavy lifting.`;
      break;
    case 'science_lab':
      if(match(t,['skeleton']))return `The skeleton keeps adjusting its own bones. Currently it's trying to scratch its back. It looks at you and shrugs, which is impressive for someone with no muscles. A name tag reads: "HI, MY NAME IS JERRY."`;
      if(match(t,['periodic table','table','elements']))return `The periodic table has rearranged itself. The recipe reads: "Take 2 parts Carbon, 1 part Hydrogen, add Oxygen, bake at 425°F, top with Mozzarellium." That last one isn't a real element but you respect the ambition.`;
      if(match(t,['beakers','bunsen','burner','experiment']))return `Beakers bubble with solutions that change color as you watch: blue to green to purple to a color you don't have a name for. One beaker appears to contain liquid sunshine.`;
      if(match(t,['turpentine','bottle','solvent','chemical']) && !flag('turpTaken'))return `A bottle of industrial-strength turpentine on the high shelf. The label reads: "WARNING: DISSOLVES PAINT, ENCHANTMENTS, AND OCCASIONALLY THE FABRIC OF REALITY." You could TAKE it.`;
      if(match(t,['note','desk']))return `Ms. Roman's desk is organized chaos. The note reads: "PLEASE DO NOT FEED THE SKELETON." Below it, in different handwriting: "He prefers calcium supplements anyway."`;
      break;
    case 'math_room':
      if(match(t,['smartboard','board','equation','screen']))return !flag('mathSolved')?`The smartboard pulses with the equation: 6 × 7 = ? The other equations scroll past in the background. One reads "2 + 2 = FISH" which tells you about the state of mathematical reality tonight.`:`The smartboard displays: "ACCESS GRANTED. COMBINATION: 23-9-42. Well done, mathematician."`;
      if(match(t,['robot','camera']))return `A small robot on the desk swivels to face you. A tiny screen on its chest displays: ":)" — then ":(" — then ":O" — then "THIS IS FINE." The robot is having a night.`;
      if(match(t,['poster']))return `"MATH: THE ONLY SUBJECT WHERE YOU BUY 60 WATERMELONS AND NO ONE ASKS WHY." Underneath someone wrote: "I asked why once. They gave me detention."`;
      if(match(t,['computers','computer','screens']))return `The computer screens glow blue with scrolling code. One screen just says "HELLO WORLD" over and over, getting increasingly desperate: "HELLO WORLD" "HELLO??" "IS ANYONE THERE" "WORLD??"`;
      break;
    case 'courtroom':
      if(match(t,['gavel']))return `The gavel bangs itself. BANG. "Order!" BANG. "Sustained!" BANG. "Overruled!" It appears to be running an entire trial by itself. Both prosecution AND defense. AND the judge.`;
      if(match(t,['constitution']))return `The Constitution is rewriting itself: "We the People of this Extremely Haunted School, in Order to form a more Perfect Midnight..." You decide not to read the amendments.`;
      if(match(t,['jury','jury box']))return `The jury box is occupied by twelve ghostly figures who keep raising their hands to vote on things. They just unanimously agreed that "pizza is the best lunch option." Hard to argue with that verdict.`;
      if(match(t,['bench','judge']))return `The judge's bench is raised, imposing, and currently occupied by a ghost who keeps slamming the gavel. The nameplate reads: "THE HONORABLE JUDGE DEFINITELY-NOT-A-GHOST."`;
      break;
    case 'creative_writing':
      if(match(t,['riddle','chalkboard','chalk','board']))return !flag('riddleSolved')?`The riddle glows in silver on the chalkboard:\n\n"I have keys but no locks,\nspace but no room,\nand you can enter\nbut can't go inside.\nWhat am I?"\n\nType ANSWER followed by your guess.`:`The chalkboard reads: "WELL DONE, WRITER." The silver letters pulse warmly.`;
      if(match(t,['typewriter']))return `The old typewriter clacks away on its own, adding to the word-storm. You peek at what it's typing: "it was the best of times it was the worst of times it was the SPOOKIEST of times—" Classic Twain. Well, close enough.`;
      if(match(t,['words','floating','fragments','sentences']))return `Sentence fragments drift like snowflakes: "the hero drew her sword and—" "once in a land of—" "the cat sat on the—" You recognize some of them from your own stories. The room remembers everything that's been written here.`;
      if(match(t,['desk','papers']))return `Ms. Obrien's desk is buried under papers. Writing prompts, story drafts, poetry submissions. You spot a paper with your handwriting on it—a poem you wrote with Annabel last week. It makes you smile even in the middle of all this weirdness.`;
      break;
    case 'music_room':
      if(match(t,['trumpet']))return `The trumpet floats in midair, bell pointing upward, playing a jaunty Coney Island tune. It's showing off and it knows it.`;
      if(match(t,['drums','drum','drumsticks']))return `The drumsticks tap out a rhythm that sounds like a heartbeat. Your heartbeat. That's either cool or terrifying and you haven't decided which.`;
      if(match(t,['piano']))return `The piano is performing an elaborate jazz arrangement of what you're pretty sure is the school's morning announcements. "ATTENTION STUDENTS" has never sounded so funky.`;
      if(match(t,['violins','violin','strings']))return `The violins sway and bow in perfect synchronization. The music is hauntingly beautiful—the kind of thing that makes you stand still and forget you're in a haunted school.`;
      if(match(t,['sheet music','music','sheets']))return `Sheet music swirls around the room like butterflies. You grab one: it's blank. Another: also blank. The notes only appear when the instruments play them.`;
      if(match(t,['metronome']))return `Tick. Tick. Tick. Matching your heartbeat exactly. You try holding your breath to see if it stops. It doesn't. But you can't hold your breath forever, so you call this experiment inconclusive.`;
      break;
    case 'black_box':
      if(match(t,['spotlight','circle','light']))return `A warm circle of light on the black floor. You step into it and feel... something. Confidence? Courage? The memory of every time you've performed—your autism awareness speech, your poetry readings, that time you played a tree in the 4th grade play (you were the BEST tree).`;
      if(match(t,['props','crown','sword','telescope']))return `A cardboard crown, a rubber sword, a paper towel telescope. The essential toolkit of dramatic imagination. With these three items, you could conquer kingdoms. Or at least get a B+ in Drama.`;
      if(match(t,['mask','masks','drama']))return `The drama mask whispers lines from plays: "To be or not to be..." "Out, out, brief candle..." "Is this a dagger which I see before me?" It's basically a one-mask Shakespeare festival.`;
      break;
    case 'rooftop':
      if(match(t,['wonder wheel','wheel']))return `The Wonder Wheel turns slowly against the stars, 150 feet tall, its cars swinging gently. It's been part of the Coney Island skyline since 1920—older than almost everything else here. Its lights shouldn't be on tonight, but they are, blue and ghostly and beautiful.`;
      if(match(t,['cyclone','roller coaster','coaster']))return `The Cyclone's wooden tracks stand against the sky like the skeleton of some ancient beast. It's been terrifying riders since 1927. Even empty and dark, you can hear the phantom rattle of its cars and the ghost-screams of a century of thrill-seekers.`;
      if(match(t,['ocean','sea','water','waves','atlantic']))return `The Atlantic Ocean stretches to infinity, dark and glittering. Waves crash against the shore in a rhythm older than the school, older than Coney Island, older than Brooklyn. It's comforting, somehow. Whatever weird magic is happening tonight, the ocean doesn't care. The ocean just keeps being the ocean.`;
      if(match(t,['boardwalk']))return `The boardwalk stretches east and west below you, silver planks in the moonlight. Empty now, but in summer it'll be packed with people eating Nathan's and trying to win stuffed animals and pretending the Cyclone doesn't scare them.`;
      if(match(t,['stars','sky','moon']))return `The stars are impossibly bright tonight—as if the ghost magic has scrubbed the city light pollution away. You can see constellations you've never seen from Brooklyn before. The moon hangs full and close, casting silver light on everything.`;
      break;
    case 'beach':
      if(match(t,['bottle','message']))return `The bottle washes up, rolls back, washes up again. You grab it. Inside: a tiny scroll that reads: "HELP, I'M TRAPPED IN A BOTTLE FACTORY." Below that, in different ink: "P.S. Just kidding. Have a great adventure, Lola. —M.T."`;
      if(match(t,['sand']))return `Cold sand, packed firm by the tide. You write your name with your toe: L-O-L-A. The next wave washes it away. The one after that writes it back.`;
      if(match(t,['ocean','water','waves','surf']))return `The waves are edged with phosphorescent blue-green light—bioluminescent plankton, glowing with each crash. It's like the ocean is showing off.`;
      break;
    case 'luna_park':
      if(match(t,['barker','ghost barker','carnival']))return !flag('pg1')?`The Ghost Barker grins too wide. His straw hat floats slightly above his transparent head. <span class="tw">"Step RIGHT up! One riddle, one prize! What has a heart that doesn't beat? Guess right and you win a PAGE from a GENUINE MARK TWAIN MANUSCRIPT!"</span>`:`The Ghost Barker tips his hat. <span class="tw">"No more riddles tonight. You're too clever for me."</span>`;
      if(match(t,['cyclone','coaster']))return `The Cyclone ROARS through its turns, empty cars screaming along wooden tracks. The oldest operating roller coaster in America, still terrifying after almost a hundred years.`;
      if(match(t,['wonder wheel','wheel']))return `The Wonder Wheel turns with silent majesty, its cars swinging in wide arcs. Each car glows a different impossible color—not just reds and blues but colors that don't have names yet.`;
      break;
    case 'nathans':
      if(match(t,['hot dog','frank','sir','furter']))return !flag('pg2')?`Sir Frank N. Furter adjusts his monocle with a tiny gloved hand(?). He's the most sophisticated hot dog in the five boroughs. <span class="tw">"I am a hot dog of CULTURE. I read Proust. I appreciate fine art. Bring me a PAINTBRUSH and I will trade you a manuscript page."</span>`:`Sir Frank is painting a surprisingly good landscape of the Coney Island boardwalk. He signs it with a flourish: "Sir F. N. Furter, 2026." The art world is not ready.`;
      if(match(t,['sign','neon','nathan']))return `The neon signs blaze: "SINCE 1916." Over a hundred years of hot dogs. That's a lot of hot dogs. Like, a LOT a lot.`;
      break;
    case 'aquarium':
      if(match(t,['octopus']))return !flag('pg3')?`The octopus is enormous—at least six feet across—with intelligent eyes behind tiny reading glasses. It holds a manuscript page in one tentacle and a cup of tea in another. The remaining six tentacles are variously holding a book, adjusting its glasses, waving at you, doing a crossword, knitting what appears to be a tiny sweater, and scratching behind what might be its ear. <span class="tw">"TALK TO me, darling. I have thoughts about narrative structure."</span>`:`The octopus is reading a novel (three actually, simultaneously) and sipping tea. It waves a tentacle. <span class="tw">"Best of luck, dear. And remember—the real treasure was the manuscript pages you found along the way. Well, also the actual manuscript pages. Those are important too."</span>`;
      if(match(t,['fish','tank','tanks']))return `Fish of every color swim in synchronized patterns behind the glass. A school of angelfish performs a choreographed dance number. A grumpy-looking pufferfish holds up a tiny sign: "I DIDN'T SIGN UP FOR THIS."`;
      break;
    case 'stillwell':
      if(match(t,['train','subway','d train','conductor']))return `The D train waits on the platform, a single silver car with its doors open. The ghost conductor smiles. <span class="tw">"Express service tonight. One stop: Times Square. Round trip. No MetroCard needed for ghosts and heroes."</span>`;
      if(match(t,['station','terminal','platform']))return `Stillwell Avenue Terminal—the end of the line for four subway routes. You've stood on these platforms a thousand times, backpack crushing your shoulders, waiting for the train that'll take you home to Brooklyn. Some mornings, waiting here at 6 AM, you wondered if it was all worth it. (It is.)`;
      break;
    case 'times_square':
      if(match(t,['billboard','billboards','sign','signs']))return `The billboards cycle through messages:\n"LOLA — CREATIVE WRITING TALENT — MARK TWAIN IS 239"\n"FUTURE POET LAUREATE? WATCH THIS SPACE"\n"SASHA SAYS HI (SHE'S PROBABLY ASLEEP BUT SHE'D SAY HI IF SHE WERE AWAKE)"\n"YOUR CAT SPUD IS FINE. HE KNOCKED YOUR WATER GLASS OFF THE TABLE AGAIN."\n"MALCOLM IN THE MIDDLE SEASON 3 IS THE BEST SEASON (DON'T @ US)"`;
      if(match(t,['conductor','train','subway']))return `The ghost conductor waits patiently at the subway entrance. <span class="tw">"Whenever you're ready, kid. The D train runs all night. Well, tonight it does."</span>`;
      break;
  }
  // More global
  if(match(t,['ceiling']))return `Acoustic ceiling tiles. Some water-stained, some missing. The usual.`;
  if(match(t,['walls','wall']))return `Walls. They've seen things. They're not talking about it.`;
  if(match(t,['floor','ground']))return `The floor. It's doing its best.`;
  if(match(t,['cat','spud']))return `You don't see a cat here. But you could swear you heard a soft "mrow" just now. You miss Spud.`;
  return null;
}

function hasItem(id){return S.inv.includes(id);}
function addItem(id){if(!S.inv.includes(id))S.inv.push(id);}
function removeItem(id){S.inv=S.inv.filter(i=>i!==id);}

  const map={

    combo:['combo','combination','code','paper','slip','locker combo'],
    sneakers:['sneakers','shoes','old sneakers','kicks','old shoes','chuck taylors'],
    paintbrush:['paintbrush','brush','paint brush'],
    notebook:['notebook','poetry notebook','poetry book'],
    flash_drive:['flash drive','drive','usb','thumb drive','flashdrive','usb drive'],
    pg1:['page 1','page one','first page','manuscript page 1'],
    pg2:['page 2','page two','second page','manuscript page 2'],
    pg3:['page 3','page three','third page','manuscript page 3'],
    manuscript:['manuscript','pages','all pages','manuscript pages']
  };
  for(const[id,aliases] of Object.entries(map)){
    if(aliases.some(a=>input===a||input.includes(a)))return id;
  }
  return input;
}

// ===== PARSER =====
function match(t,arr){return arr.includes(t);}

function handleInput(raw){
  raw=raw.trim();
  if(!raw)return;
  S.history.push(raw);
  S.histIdx=S.history.length;
  print('&gt; '+escHtml(raw),'cmd-echo');

  let input=raw.toLowerCase().replace(/[^\w\s'-]/g,'').replace(/\b(the|a|an)\b/g,' ').replace(/\s+/g,' ').trim();
  if(!input)return;
  S.turns++;

  const words=input.split(' ');
  const verb=words[0];
  const rest=words.slice(1).join(' ');

  const dirMap={n:'n',s:'s',e:'e',w:'w',u:'u',d:'d',
    north:'n',south:'s',east:'e',west:'w',up:'u',down:'d',
    upstairs:'u',downstairs:'d'};

  if(dirMap[verb]&&!rest)return go(dirMap[verb]);
  if(verb==='go'&&dirMap[rest])return go(dirMap[rest]);

  // Special commands
  if(verb==='board'&&rest.includes('train'))return boardTrain();
  if(verb==='ride'&&rest.includes('train'))return boardTrain();

  switch(verb){
    case 'look':case 'l':
      if(rest)return examine(rest.replace(/^at /,''));
      return showRoom();
    case 'examine':case 'x':case 'inspect':case 'study':case 'check':
      return examine(rest);
    case 'go':case 'walk':case 'move':case 'run':case 'climb':
      if(dirMap[rest])return go(dirMap[rest]);
      return print(`Go where? Try a direction: NORTH, SOUTH, EAST, WEST, UP, or DOWN.`);
    case 'take':case 'get':case 'grab':
      return take(rest.replace(/^up /,''));
    case 'pick':
      return take(rest.replace(/^up /,''));
    case 'drop':case 'put':
      return drop(rest.replace(/^down /,''));
    case 'use':case 'apply':case 'pour':
      return use(rest);
    case 'give':case 'hand':case 'offer':
      return give(rest);
    case 'talk':case 'speak':case 'ask':case 'chat':
      return talk(rest.replace(/^to /,'').replace(/^with /,''));
    case 'open':
      return doOpen(rest);
    case 'read':
      return doRead(rest);
    case 'answer':case 'type':case 'enter':case 'guess':
      return doAnswer(rest);
    case 'inventory':case 'i':
      return doInventory();
    case 'help':
      return doHelp();
    case 'listen':
      return doListen();
    case 'smell':case 'sniff':
      return doSmell();
    case 'map':case 'm':
      return doMap();
    case 'save':
      return doSave();
    case 'load':case 'restore':
      return doLoad();
    case 'restart':case 'new':case 'reset':
      return doRestart();
    case 'score':
      return print(`Your score is <span class="win">${S.score}</span> out of 100 in ${S.turns} turns.`);
    case 'wait':case 'z':
      return print(`Time passes. The school continues to be haunted.`);
    case 'sing':
      return print(`♪ You sing a few bars. The acoustics in ${rooms[S.room]?.name||'here'} are surprisingly good. ♪`);
    case 'dance':
      return print(`You bust a move. If the Dance talent saw this, they'd either be impressed or very concerned.`);
    case 'jump':
      return print(`You jump! For a glorious moment, you defy gravity. Then gravity wins, as it always does.`);
    case 'scream':case 'yell':case 'shout':
      return print(`Your voice echoes through the ${flag('act2')?'streets':'hallways'}. Something echoes back. You decide not to scream again.`);
    case 'swim':
      return S.room==='beach'?print(`You wade in up to your ankles. The bioluminescent water glows around your feet. Beautiful—but COLD. You retreat.`):print(`There's no water here. The ocean is that way, though.`);
    case 'cry':
      return print(`No time for tears. Your friends need you. You take a deep breath and keep going. That's what heroes do.`);
    case 'sleep':case 'nap':case 'rest':
      return print(`You are SO tired. You wake up at dawn every day to catch the bus from Brooklyn. But sleeping in a haunted school seems like a bad idea, even by your standards.`);
    case 'eat':
      return doEat(rest);
    case 'hug':
      return doHug(rest);
    case 'fight':case 'attack':case 'punch':case 'kick':case 'hit':
      return print(`This isn't that kind of adventure. Your talents are better used elsewhere—like, literally anywhere else.`);
    case 'fly':
      return print(`You flap your arms vigorously. Nothing happens. The Wind Instruments talent would appreciate the air movement, at least.`);
    case 'xyzzy':
      return print(`Nothing happens. This isn't Colossal Cave. It's a school in Coney Island, which is arguably weirder.`);
    case 'plugh':
      return print(`A hollow voice says "FOOL!" Then adds, more kindly: "Sorry, force of habit."`);
    case 'hello':case 'hi':case 'hey':
      return print(`Is there someone here you'd like to talk to? Try TALK TO [someone].`);
    case 'play':
      return doPlay(rest);
    case 'quit':case 'exit':
      return print(`You can't quit now—your friends need you! (But you can close the tab if you really want to leave.)`);
    case 'who':
      if(rest.includes('twain')||rest.includes('mark'))return print(`Samuel Langhorne Clemens (November 30, 1835 - April 21, 1910), known by his pen name Mark Twain, was an American writer, humorist, and lecturer. They named YOUR school after him. And apparently he haunts it. So there's that.`);
      break;
    case 'pet':
      if(match(rest,['cat','spud','kitty']))return print(`You reach out to pet the cat, but it's already gone. Classic Spud behavior, actually.`);
      break;
    case 'think':
      return print(`You think about your situation. You're in a haunted school at midnight, your friends are trapped by magic, and your phone is locked in a Yondr pouch. On the plus side: no homework tonight.`);
    case 'pray':
      return print(`You send a quick thought upward. A ghost drifts by and says, <span class="tw">"I'll put in a good word."</span>`);
    default:
      return print(`I don't understand "${escHtml(words[0])}." Type <span class="hint">HELP</span> for commands.`);
  }
  print(`I'm not sure what you mean. Type <span class="hint">HELP</span> for commands.`);
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ===== MOVEMENT =====
function go(dir){
  const r=rooms[S.room];
  if(!r||!r.exits)return print(`You can't go that way.`);
  let dest=r.exits[dir];
  if(!dest)return print(`You can't go that way.`);

  // Front doors logic
  if(dest==='_front_doors'){
    if(!flag('act2'))return print(`The front doors are sealed shut by a shimmering force field. Whatever magic is keeping this school awake is also keeping you IN. You'll need to finish the Midnight Talent Show first.`);
    dest='neptune_ave';
  }

  S.room=dest;
  showRoom();

  // Trigger events
  if(dest==='lobby'&&!flag('metTwain'))twainIntro();

  // Atmosphere (every ~4 turns)
  if(S.turns%4===0&&!flag('act2')){
    const msg=atmos[Math.floor(Math.random()*atmos.length)];
    printBlank();
    print(msg,'atm');
  }
}

function examine(what){
  if(!what)return print(`What do you want to examine?`);
  const result=getExamine(what);
  if(result)return print(result);
  print(`You don't see anything special about "${escHtml(what)}." Try LOOK to see what's around.`);
}

function take(what){
  if(!what)return print(`Take what?`);
  const id=findItem(what);
  if(S.room==='science_lab'&&match(id,['turpentine'])&&!flag('turpTaken')){
    addItem('turpentine');setFlag('turpTaken');addScore(5);

  }
  if(S.room==='basement'&&match(id,['sneakers','shoes','old sneakers'])&&flag('boxOpened')&&!flag('sneakersTaken')){
    addItem('sneakers');setFlag('sneakersTaken');addScore(5);

  }
  if(hasItem(id))return print(`You already have that.`);
  if(S.room==='beach'&&match(what,['bottle','message']))

function drop(what){
  if(!what)return print(`Drop what?`);
  const id=findItem(what);
  if(!hasItem(id))return print(`You don't have that.`);
  if(id==='backpack')return print(`Your backpack is your life. You'd sooner drop your IDENTITY than your backpack. (Also you kind of need it.)`)
  if(id==='flashlight')return print(`Drop your only light source in a haunted school at midnight? Hard pass.`);
  removeItem(id);
  print(`Dropped.`);
}

    print(`<span class="win">[Annabel rescued! Received: Paintbrush]</span>`);

  }

  if(itemId==='red_pen'&&S.room==='library'&&!flag('sophiaFreed')){
    if(target&&!match(target,['book','enchanted book','glowing book','purple book','sophia']))return print(`Try using the red pen ON the book.`);

    printBlank();
    print(`You uncap the Red Pen and write in the margin of the enchanted book. The words flow from the pen like liquid light:`);

    printBlank();
    print(`The book shudders. The purple glow fades. Pages flip rapidly to the end, where your new ending sits in glowing red ink.`);
    printBlank();
    print(`Sophia blinks, pulls her hands free, and gasps. <span class="chr">"Lola! That book—it just kept GOING. Chapter after chapter after chapter. The plot made no sense but I couldn't stop READING."</span>`);
    printBlank();
    print(`She stretches her stiff fingers, then pulls a worn notebook from her bag. <span class="chr">"Take my poetry notebook. You and Annabel always liked the poems in there. Maybe the words will help."</span>`);
    printBlank();
    print(`<span class="win">[Sophia rescued! Received: Poetry Notebook]</span>`);
    checkAllRescued();
    return;
  }
  if(itemId==='red_pen')return print(`There's nothing that needs editing here. Well, nothing that needs MAGICAL editing.`);

  // COMBO on BOX (Basement)
  if(itemId==='combo'&&S.room==='basement'&&!flag('boxOpened')){
    if(target&&!match(target,['box','lock','wooden box','combination lock']))return print(`Try using the combo ON the box.`);
    setFlag('boxOpened');
    printBlank();

    printBlank();
    print(`Inside: a pair of old Chuck Taylor sneakers, faintly glowing. They look ancient but somehow perfect.`);
    printBlank();
    print(`Mr. Whiskers peers into the box. <span class="tw">"Ah, the Athletics sneakers. Been down here since the school went magnet. They've got some magic left in 'em. Mrrr."</span>`);
    printBlank();
    print(`<span class="hint">You can TAKE the sneakers now.</span>`);
    return;
  }

  if(S.room==='auditorium'&&flag('allRescued')&&!flag('gameWon')){

      setFlag('ts1');removeItem('paintbrush');

      checkTalentShow();return;

function doAnswer(ans){
  if(!ans)return print(`Answer what? Type ANSWER followed by your guess.`);
  ans=ans.trim().toLowerCase();

  // Creative Writing riddle
  if(S.room==='creative_writing'&&!flag('riddleSolved')){
    if(match(ans,['keyboard','a keyboard'])){
      setFlag('riddleSolved');addItem('red_pen');addScore(5);
      printBlank();
      print(`The floating words freeze in midair. Then they begin to swirl—faster and faster—forming a tornado of letters that spirals down to the desk and SOLIDIFIES into a glowing <span class="item">Red Pen</span>.`);
      printBlank();
      print(`The chalkboard shimmers: <span class="win">"WELL DONE, WRITER."</span>`);
      printBlank();
      print(`The pen hums with editorial power. You can feel it wanting to correct things.`);
      printBlank();
      print(`<span class="win">[Received: Red Pen]</span>`);
      return;
    }
    return print(`The floating words shiver and rearrange: <span class="tw">"Not quite. Think about what writers use..."</span> The riddle pulses on the chalkboard, patient.`);
  }

  // Math room puzzle
  if(S.room==='math_room'&&!flag('mathSolved')){
    if(match(ans,['42','forty-two','fortytwo','forty two'])){
      setFlag('mathSolved');addItem('combo');addScore(5);
      printBlank();
      print(`The smartboard flashes green: <span class="win">CORRECT! 6 × 7 = 42!</span>`);
      printBlank();
      print(`Equations cascade across the screen in celebration. The robot does a tiny dance on the desk. Then the smartboard displays:`);
      printBlank();
      print(`<span class="item">COMBINATION: 23-9-42</span>`);
      print(`<span class="item">LOCATION: BASEMENT STORAGE BOX</span>`);
      printBlank();
      print(`A slip of paper prints from the classroom printer. You take it.`);
      printBlank();
      print(`<span class="win">[Received: Locker Combination]</span>`);
      return;
    }
    return print(`The smartboard buzzes red: <span class="err">INCORRECT.</span> The robot's screen shows ":(" Try again. What is 6 × 7?`);
  }

  // Luna Park riddle
  if(S.room==='luna_park'&&!flag('pg1')){
    if(match(ans,['artichoke','an artichoke'])){
      setFlag('pg1');addItem('pg1');addScore(5);
      printBlank();
      print(`The Ghost Barker's grin somehow gets even wider. <span class="tw">"AN ARTICHOKE! Correct! Ha HA! The artichoke—a heart, but no heartbeat! You're a clever one!"</span>`);
      printBlank();
      print(`He reaches into his booth and pulls out a yellowed manuscript page, presenting it with a ghostly flourish. <span class="tw">"Your prize, kid! One page from a lost Mark Twain manuscript! Handle with care—it's been through a lot."</span>`);
      printBlank();
      print(`<span class="win">[Received: Manuscript Page 1]</span>`);
      checkManuscript();
      return;
    }
    return print(`The Ghost Barker shakes his head. <span class="tw">"WRONG! Try again! What has a heart that doesn't beat? Think about it... it's not an animal..."</span> <span class="hint">Think vegetables.</span>`);
  }

  print(`There's no puzzle to answer here.`);
}

    print(`<span class="tw">"THAT,"</span> he says, voice trembling with pride, <span class="tw">"is what this school is about. Art and Writing and Math and Science and Music and Drama and Computer Science and Dance—ALL of it, TOGETHER. Every talent, a light. Every student, a star."</span>`);
    printBlank();
    print(`He looks at you and your friends—Annabel with paint in her hair, Sophia rubbing her eyes, Conor still in the magic sneakers.`);
    printBlank();
    print(`<span class="tw">"Explore. Dream. Discover. You've done all three tonight."</span>`);
    printBlank();
    print(`The three gifts float gently back into your hands, glowing with residual magic.`);
    addItem('paintbrush');addItem('notebook');addItem('flash_drive');
    printBlank();
    print(`The ghosts fade. The green lights warm back to normal. The clocks start running forward. The spell on the school... breaks.`);
    printBlank();
    print(`<span class="win">═══ ACT 1 COMPLETE ═══</span>`);
    print(`<span class="win">The school is saved! But Mark Twain has one more task for you...</span>`);
    printBlank();
    print(`The front doors of IS 239 click and swing open. Cool night air rushes in, carrying the salt smell of the ocean and the distant music of a carousel.`);
    printBlank();
    print(`<span class="tw">"The magic has spread beyond the school,"</span> Mark Twain whispers from somewhere. <span class="tw">"Coney Island is awake. Find my three lost manuscript pages scattered out there and read them on the boardwalk. Then everything sleeps again."</span>`);
    printBlank();
    print(`<span class="hint">The front doors are now OPEN. Go SOUTH from the lobby to explore Coney Island!</span>`);
    setFlag('act2');
    setFlag('fridaySnacks');
  }
}

function checkManuscript(){
  if(flag('pg1')&&flag('pg2')&&flag('pg3')&&!hasItem('manuscript')){
    removeItem('pg1');removeItem('pg2');removeItem('pg3');
    addItem('manuscript');
    printBlank();
    print(`The three manuscript pages flutter in your hands, then press together and MERGE into a single document. The handwriting glows gold. You can feel the words humming.`);
    printBlank();
    print(`<span class="win">[The three pages have combined into: Complete Manuscript]</span>`);
    printBlank();
    print(`<span class="hint">Go to the BOARDWALK and READ MANUSCRIPT to complete your adventure.</span>`);
  }
}

// ===== SAVE / LOAD / RESTART =====
function doSave(){
  try{
    const data=JSON.stringify({room:S.room,inv:S.inv,score:S.score,turns:S.turns,
      visited:Array.from(S.visited),flags:S.flags});
    localStorage.setItem('midnight_talent_show_save',data);
    print(`<span class="win">Game saved!</span> Use LOAD to restore.`);
  }catch(e){print(`<span class="err">Couldn't save. Your browser may be blocking storage.</span>`);}
}

function doLoad(){
  try{
    const data=localStorage.getItem('midnight_talent_show_save');
    if(!data)return print(`<span class="err">No saved game found.</span>`);
    const d=JSON.parse(data);
    S.room=d.room;S.inv=d.inv;S.score=d.score;S.turns=d.turns;
    S.visited=new Set(d.visited);S.flags=d.flags;
    S.history=[];S.histIdx=-1;
    print(`<span class="win">Game loaded!</span>`);
    showRoom();
  }catch(e){print(`<span class="err">Couldn't load. Save file may be corrupted.</span>`);}
}

function doRestart(){
  S.room='lobby';S.inv=['flashlight','backpack'];S.score=0;S.turns=0;
  S.visited=new Set();S.flags={};S.history=[];S.histIdx=-1;
  out.innerHTML='';
  init();
}

// ===== EVENT LISTENERS =====
cmdInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    const val=cmdInput.value;
    cmdInput.value='';
    handleInput(val);
    updateBar();
  }
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(S.histIdx>0){S.histIdx--;cmdInput.value=S.history[S.histIdx];}
    else if(S.histIdx===0){cmdInput.value=S.history[0];}
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(S.histIdx<S.history.length-1){S.histIdx++;cmdInput.value=S.history[S.histIdx];}
    else{S.histIdx=S.history.length;cmdInput.value='';}
  }
});

// Click anywhere focuses input
document.addEventListener('click',()=>cmdInput.focus());

// Start
init();
</script>
